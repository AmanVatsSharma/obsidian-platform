<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body{margin:0;background:var(--bg-base);padding:20px;color:var(--fg2);display:grid;grid-template-columns:repeat(10,1fr);gap:12px;text-align:center;font-family:var(--font-ui);font-size:9px}
.i{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--fg2)}
.i svg{width:18px;height:18px;stroke-width:2}
.i span{color:var(--fg3);font-family:var(--font-data);letter-spacing:0.04em}
</style></head><body>
<div class="i"><i data-lucide="search"></i><span>search</span></div>
<div class="i"><i data-lucide="bell"></i><span>bell</span></div>
<div class="i"><i data-lucide="settings"></i><span>settings</span></div>
<div class="i"><i data-lucide="trending-up"></i><span>trend-up</span></div>
<div class="i"><i data-lucide="trending-down"></i><span>trend-dn</span></div>
<div class="i"><i data-lucide="candlestick-chart"></i><span>candle</span></div>
<div class="i"><i data-lucide="line-chart"></i><span>line</span></div>
<div class="i"><i data-lucide="bar-chart-2"></i><span>bar</span></div>
<div class="i"><i data-lucide="activity"></i><span>activity</span></div>
<div class="i"><i data-lucide="zap"></i><span>zap</span></div>
<div class="i"><i data-lucide="shield"></i><span>shield</span></div>
<div class="i"><i data-lucide="dollar-sign"></i><span>dollar</span></div>
<div class="i"><i data-lucide="database"></i><span>database</span></div>
<div class="i"><i data-lucide="wifi"></i><span>wifi</span></div>
<div class="i"><i data-lucide="calendar"></i><span>calendar</span></div>
<div class="i"><i data-lucide="newspaper"></i><span>news</span></div>
<div class="i"><i data-lucide="book-open"></i><span>book</span></div>
<div class="i"><i data-lucide="layers"></i><span>layers</span></div>
<div class="i"><i data-lucide="copy"></i><span>copy</span></div>
<div class="i"><i data-lucide="edit"></i><span>edit</span></div>
<script>lucide.createIcons();</script>
</body></html>
