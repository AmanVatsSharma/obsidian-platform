<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:0;color:var(--fg1);font-family:var(--font-ui)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 12px;text-align:left;font-family:var(--font-data);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg3);background:var(--bg-elevated);border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--font-data);white-space:nowrap;color:var(--fg2)}
tr:hover td{background:var(--bg-hover)}
.s{color:var(--fg1);font-weight:600}
.r{text-align:right}
.bull{color:#10D996}.bear{color:#FF3B5C}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700}
.buy{background:rgba(16,217,150,0.1);color:#10D996}
.sell{background:rgba(255,59,92,0.1);color:#FF3B5C}
</style></head><body>
<table>
<thead><tr><th>Symbol</th><th>Side</th><th class="r">Vol</th><th class="r">Entry</th><th class="r">Current</th><th class="r">P&L</th></tr></thead>
<tbody>
<tr><td class="s">EUR/USD</td><td><span class="tag buy">BUY</span></td><td class="r">0.50</td><td class="r">1.08412</td><td class="r">1.08452</td><td class="r bull">+$20.00</td></tr>
<tr><td class="s">XAU/USD</td><td><span class="tag sell">SELL</span></td><td class="r">0.25</td><td class="r">2341.20</td><td class="r">2338.45</td><td class="r bull">+$68.75</td></tr>
<tr><td class="s">BTC/USD</td><td><span class="tag buy">BUY</span></td><td class="r">0.10</td><td class="r">68,420</td><td class="r">67,980</td><td class="r bear">-$44.00</td></tr>
</tbody></table>
</body></html>
