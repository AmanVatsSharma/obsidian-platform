<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:20px;color:var(--fg1);display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg1)}
.dot{width:10px;height:10px;border-radius:50%;background:#3B82F6;box-shadow:0 0 12px #3B82F6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #3B82F6}50%{opacity:0.6;box-shadow:0 0 16px #3B82F6}}
.mark{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#3B82F6,#A855F7);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;color:#fff;font-size:14px}
.compact{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg1)}
.compact span{color:#3B82F6}
</style></head><body>
<div class="logo"><div class="dot"></div>OBSIDIAN</div>
<div style="display:flex;align-items:center;gap:8px"><div class="mark">O</div><div class="compact">OBSIDIAN<br><span style="font-size:9px;color:var(--fg3);letter-spacing:0.1em">v2.4.0</span></div></div>
<div style="display:flex;align-items:center;gap:8px"><div class="mark" style="background:linear-gradient(135deg,#3B82F6,#6366F1);width:22px;height:22px;border-radius:50%;font-size:9px">AM</div><div style="font-family:var(--font-data);font-size:12px;color:var(--fg1)">Account Avatar</div></div>
</body></html>
