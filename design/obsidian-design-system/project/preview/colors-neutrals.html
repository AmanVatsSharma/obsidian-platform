<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:16px;display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sw{aspect-ratio:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid var(--border);margin:-1px}
.sw .n{font-family:var(--font-data);font-size:10px;color:var(--fg1);font-weight:600}
.sw .h{font-family:var(--font-data);font-size:9px;color:var(--fg3);letter-spacing:0.04em;margin-top:2px}
.dark .n{color:var(--fg2)}
</style></head><body>
<div class="sw dark" style="background:#06080A"><div class="n">bg-base</div><div class="h">#06080A</div></div>
<div class="sw dark" style="background:#0C0E12"><div class="n">bg-surface</div><div class="h">#0C0E12</div></div>
<div class="sw dark" style="background:#0F1216"><div class="n">bg-panel</div><div class="h">#0F1216</div></div>
<div class="sw dark" style="background:#141820"><div class="n">bg-elev</div><div class="h">#141820</div></div>
<div class="sw dark" style="background:#1A1F28"><div class="n">bg-hover</div><div class="h">#1A1F28</div></div>
<div class="sw dark" style="background:#1E2530"><div class="n">bg-active</div><div class="h">#1E2530</div></div>
</body></html>
