<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.p{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-family:var(--font-data);font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
.dot{width:5px;height:5px;border-radius:50%}
.open{background:rgba(16,217,150,0.10);color:#10D996;border:1px solid rgba(16,217,150,0.2)}
.open .dot{background:#10D996;animation:blink 1.5s infinite}
.closed{background:#141820;color:#4A5568;border:1px solid var(--border)}
.closed .dot{background:#4A5568}
.warn{background:rgba(245,158,11,0.10);color:#F59E0B;border:1px solid rgba(245,158,11,0.2)}
.warn .dot{background:#F59E0B}
.accent{background:rgba(59,130,246,0.10);color:#3B82F6;border:1px solid rgba(59,130,246,0.25)}
.accent .dot{background:#3B82F6}
.bear{background:rgba(255,59,92,0.10);color:#FF3B5C;border:1px solid rgba(255,59,92,0.2)}
.tag{border-radius:3px;padding:2px 7px;font-weight:700}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style></head><body>
<span class="p open"><span class="dot"></span>NY Open</span>
<span class="p open"><span class="dot"></span>LON Open</span>
<span class="p closed"><span class="dot"></span>TKY Closed</span>
<span class="p warn"><span class="dot"></span>Degraded</span>
<span class="p accent">SILVER</span>
<span class="p" style="background:rgba(234,179,8,0.10);color:#EAB308;border:1px solid rgba(234,179,8,0.25)">GOLD</span>
<span class="p" style="background:rgba(168,85,247,0.10);color:#A855F7;border:1px solid rgba(168,85,247,0.25)">PLATINUM</span>
<span class="p tag" style="background:rgba(16,217,150,0.10);color:#10D996">BUY</span>
<span class="p tag" style="background:rgba(255,59,92,0.10);color:#FF3B5C">SELL</span>
<span class="p bear"><span class="dot" style="background:#FF3B5C;box-shadow:0 0 6px #FF3B5C"></span>CRITICAL</span>
</body></html>
