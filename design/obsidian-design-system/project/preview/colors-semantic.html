<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:16px;display:grid;grid-template-columns:repeat(5,1fr);gap:0}
.sw{aspect-ratio:1.1;display:flex;flex-direction:column;justify-content:space-between;padding:12px;border:1px solid var(--border);margin:-1px;position:relative;overflow:hidden}
.sw .n{font-family:var(--font-display);font-size:11px;color:#fff;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;z-index:1}
.sw .h{font-family:var(--font-data);font-size:10px;color:rgba(255,255,255,0.8);letter-spacing:0.02em;z-index:1}
.tint{background:rgba(255,255,255,0.05);color:#fff}
</style></head><body>
<div class="sw" style="background:#10D996;color:#000"><div class="n" style="color:#000">Bull</div><div class="h" style="color:rgba(0,0,0,0.6)">#10D996</div></div>
<div class="sw" style="background:#FF3B5C"><div class="n">Bear</div><div class="h">#FF3B5C</div></div>
<div class="sw" style="background:#3B82F6"><div class="n">Accent</div><div class="h">#3B82F6</div></div>
<div class="sw" style="background:#F59E0B;color:#000"><div class="n" style="color:#000">Warn</div><div class="h" style="color:rgba(0,0,0,0.6)">#F59E0B</div></div>
<div class="sw" style="background:#A855F7"><div class="n">Purple</div><div class="h">#A855F7</div></div>
</body></html>
