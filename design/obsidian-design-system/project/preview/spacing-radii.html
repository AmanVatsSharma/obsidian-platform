<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:20px;color:var(--fg1);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:10px}
.lab{font-family:var(--font-data);font-size:10px;color:var(--fg3);letter-spacing:0.06em;text-transform:uppercase;min-width:38px}
.sq{background:var(--bg-panel);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--fg2);font-family:var(--font-data);font-size:9px}
</style></head><body>
<div class="row"><div class="lab">r-sm</div><div class="sq" style="width:52px;height:52px;border-radius:4px">4px</div></div>
<div class="row"><div class="lab">r-md</div><div class="sq" style="width:52px;height:52px;border-radius:6px">6px</div></div>
<div class="row"><div class="lab">r-lg</div><div class="sq" style="width:52px;height:52px;border-radius:8px">8px</div></div>
<div class="row"><div class="lab">r-xl</div><div class="sq" style="width:52px;height:52px;border-radius:12px">12px</div></div>
</body></html>
