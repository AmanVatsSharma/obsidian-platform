<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;background:var(--bg-base);padding:20px;color:var(--fg1);display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--font-ui);font-size:12px}
.panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.hdr{padding:0 12px;height:34px;display:flex;align-items:center;background:var(--bg-elevated);border-bottom:1px solid var(--border)}
.ttl{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg3)}
.body{padding:12px;font-family:var(--font-data);font-size:12px;color:var(--fg2)}
.row{display:flex;justify-content:space-between;padding:4px 0}
.b{color:var(--fg1);font-weight:600}
.bull{color:#10D996}.bear{color:#FF3B5C}
</style></head><body>
<div class="panel"><div class="hdr"><div class="ttl">Watchlist</div></div><div class="body">
<div class="row"><span class="b">EUR/USD</span><span class="bull">1.08452</span></div>
<div class="row"><span class="b">GBP/USD</span><span class="bear">1.26340</span></div>
<div class="row"><span class="b">XAU/USD</span><span class="bull">2341.20</span></div>
</div></div>
<div class="panel"><div class="hdr"><div class="ttl">Order Entry · BUY</div></div><div class="body">
<div class="row"><span>Bid</span><span class="bull b">1.08452</span></div>
<div class="row"><span>Ask</span><span class="bear b">1.08454</span></div>
<div class="row"><span>Spread</span><span style="color:#F59E0B">0.2 pips</span></div>
</div></div>
</body></html>
