<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1440" />
<title>OBSIDIAN DESK — FX/CFD Dealing Workstation</title>
<style>
/* ═══════════════════════════════════════════════════════════
   OBSIDIAN DESK — Design System
   Extended Obsidian Terminal Theme
   ═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

/* ─── ROOT TOKENS ─────────────────────────────────────────── */
:root {
  /* Core palette */
  --bg-base:     #06080A;
  --bg-surface:  #0C0E12;
  --bg-panel:    #0F1216;
  --bg-elevated: #141820;
  --bg-hover:    #1A1F28;
  --bg-active:   #1E2430;

  /* Semantic colors */
  --bull:        #10D996;
  --bull-dim:    #0A7A56;
  --bull-glow:   rgba(16, 217, 150, 0.15);
  --bear:        #FF3B5C;
  --bear-dim:    #8C1F31;
  --bear-glow:   rgba(255, 59, 92, 0.15);
  --accent:      #3B82F6;
  --accent-dim:  #1E3D7A;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --warn:        #F59E0B;
  --warn-dim:    #7A4E05;
  --warn-glow:   rgba(245, 158, 11, 0.15);
  --purple:      #8B5CF6;
  --purple-dim:  #4C2A8C;
  --gold:        #EAB308;
  --gold-dim:    #7A5C04;

  /* Text */
  --text-primary:   #E8EBF0;
  --text-secondary: #8B9AB0;
  --text-muted:     #4A5568;
  --text-dim:       #2D3748;

  /* Borders */
  --border:       #1E2430;
  --border-bright:#2D3748;
  --border-accent: rgba(59, 130, 246, 0.3);

  /* Fonts */
  --font-data:    'IBM Plex Mono', 'Courier New', monospace;
  --font-display: 'Syne', sans-serif;
  --font-ui:      'DM Sans', system-ui, sans-serif;

  /* Sizes */
  --bar-top:    52px;
  --bar-bottom: 24px;
  --rail-left:  300px;
  --rail-right: 340px;
  --radius:     4px;
  --radius-lg:  8px;
}

/* ─── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui); font-size: 13px; line-height: 1.4; overflow: hidden; min-width: 1440px; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, select { font-family: var(--font-data); background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary); border-radius: var(--radius); outline: none; }
input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ═══════════════════════════════════════════════════════════
   LAYOUT SHELL
   ═══════════════════════════════════════════════════════════ */
.desk-shell {
  display: grid;
  grid-template-rows: var(--bar-top) 1fr var(--bar-bottom);
  grid-template-columns: 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}
.desk-body {
  display: grid;
  grid-template-columns: var(--rail-left) 1fr var(--rail-right);
  overflow: hidden;
  background: var(--bg-base);
  gap: 0;
}
.desk-center {
  display: grid;
  grid-template-rows: 200px 1fr;
  overflow: hidden;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

/* ═══════════════════════════════════════════════════════════
   TOP COMMAND BAR
   ═══════════════════════════════════════════════════════════ */
.cmd-bar {
  height: var(--bar-top);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 0;
  overflow: hidden;
  flex-shrink: 0;
  z-index: 100;
}
.cmd-logo {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
  padding-right: 16px;
  border-right: 1px solid var(--border);
  margin-right: 12px;
}
.cmd-logo span { color: var(--text-muted); font-weight: 400; }
.cmd-divider { width: 1px; height: 28px; background: var(--border); margin: 0 10px; flex-shrink: 0; }
.cmd-section { display: flex; align-items: center; gap: 8px; padding: 0 8px; }
.cmd-item { display: flex; align-items: center; gap: 5px; font-family: var(--font-data); font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
.cmd-item .label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.cmd-item .value { color: var(--text-primary); }
.cmd-clock { font-family: var(--font-data); font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.08em; }
.cmd-shift { font-family: var(--font-data); font-size: 12px; }
.cmd-shift.warn { color: var(--warn); }
.cmd-shift.danger { color: var(--bear); }

/* Session pills */
.session-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 7px; border-radius: 20px;
  font-family: var(--font-data); font-size: 10px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg-panel);
  color: var(--text-muted);
  white-space: nowrap;
}
.session-pill.open { border-color: var(--bull-dim); color: var(--bull); background: var(--bull-glow); }
.session-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.session-pill.open .dot { animation: pulse-dot 2s infinite; }

/* Latency */
.latency-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 3px;
  font-family: var(--font-data); font-size: 11px; font-weight: 600;
  background: var(--bg-panel); border: 1px solid var(--border);
}
.latency-badge.green { color: var(--bull); border-color: var(--bull-dim); }
.latency-badge.amber { color: var(--warn); border-color: var(--warn-dim); }
.latency-badge.red   { color: var(--bear); border-color: var(--bear-dim); }
.latency-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: pulse-dot 1s infinite; }

/* Toggle badges */
.cmd-toggle {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 3px;
  font-family: var(--font-data); font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-panel);
  color: var(--text-muted); cursor: pointer; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.05em;
  transition: all 0.15s;
}
.cmd-toggle:hover { border-color: var(--border-bright); color: var(--text-secondary); }
.cmd-toggle.on  { border-color: var(--bull-dim); color: var(--bull); background: var(--bull-glow); }
.cmd-toggle.on .dot { background: var(--bull); animation: pulse-dot 2s infinite; }
.cmd-toggle.warn { border-color: var(--warn-dim); color: var(--warn); background: var(--warn-glow); }
.cmd-toggle.danger { border-color: var(--bear-dim); color: var(--bear); background: var(--bear-glow); }
.cmd-toggle .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }

/* Alert badge */
.alert-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: 3px;
  font-family: var(--font-data); font-size: 11px; font-weight: 700;
  border: 1px solid var(--warn-dim); color: var(--warn); background: var(--warn-glow);
  cursor: pointer; white-space: nowrap;
  animation: warn-pulse 3s infinite;
}

/* Emergency buttons */
.cmd-emergency { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
.btn-emergency {
  padding: 5px 10px; border-radius: 3px;
  font-family: var(--font-data); font-size: 10px; font-weight: 700;
  border: 1px solid var(--bear-dim); color: var(--bear); background: rgba(255,59,92,0.08);
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em;
  transition: all 0.15s; white-space: nowrap;
}
.btn-emergency:hover { background: var(--bear-glow); border-color: var(--bear); box-shadow: 0 0 10px rgba(255,59,92,0.3); }
.btn-emergency.halt { background: rgba(255,59,92,0.15); box-shadow: 0 0 8px rgba(255,59,92,0.2); }

/* Dealer dropdown */
.dealer-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 3px;
  font-family: var(--font-ui); font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-primary);
  cursor: pointer; white-space: nowrap;
}
.dealer-btn:hover { border-color: var(--accent); }
.dealer-avatar { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-dim); color: var(--accent); font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: var(--font-data); flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════
   LEFT RAIL
   ═══════════════════════════════════════════════════════════ */
.left-rail {
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  height: 100%;
}

/* Rail section header */
.rail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px 6px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  flex-shrink: 0;
}
.rail-title {
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px;
}
.count-badge {
  font-family: var(--font-data); font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
  background: var(--bg-elevated); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.count-badge.urgent { background: var(--bear-glow); color: var(--bear); border-color: var(--bear-dim); animation: warn-pulse 2s infinite; }

/* Bulk actions bar */
.bulk-actions {
  display: flex; gap: 4px; padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0;
}
.btn-bulk {
  flex: 1; padding: 4px 0; border-radius: 3px;
  font-family: var(--font-data); font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text-muted);
  background: var(--bg-panel); cursor: pointer; text-transform: uppercase;
  letter-spacing: 0.05em; transition: all 0.15s;
}
.btn-bulk.accept:hover { border-color: var(--bull-dim); color: var(--bull); background: var(--bull-glow); }
.btn-bulk.reject:hover { border-color: var(--bear-dim); color: var(--bear); background: var(--bear-glow); }
.btn-bulk.requote:hover { border-color: var(--warn-dim); color: var(--warn); background: var(--warn-glow); }

/* Order queue scroll area */
.order-queue {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  min-height: 0;
}

/* Order card */
.order-card {
  position: relative;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  padding: 8px 10px;
  cursor: pointer;
  transition: background 0.15s;
  animation: slideInTop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.order-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  transition: background 0.3s;
}
.order-card.age-new::before    { background: var(--bull); }
.order-card.age-mid::before    { background: var(--warn); }
.order-card.age-old::before    { background: var(--bear); }
.order-card.tier-vip::before   { background: var(--purple); }
.order-card.notional-big::before { background: var(--gold); }
.order-card:hover { background: var(--bg-elevated); }
.order-card.focused { background: var(--bg-active); outline: 1px solid var(--accent-dim); }
.order-card.flashing-accept { animation: flashAccept 0.4s; }
.order-card.flashing-reject { animation: flashReject 0.4s; }

/* Card rows */
.oc-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.oc-client { font-size: 11px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 5px; }
.oc-tier { font-family: var(--font-data); font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
.tier-vip    { background: rgba(139,92,246,0.2); color: var(--purple); border: 1px solid rgba(139,92,246,0.4); }
.tier-pro    { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(59,130,246,0.4); }
.tier-retail { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }
.oc-age { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
.oc-age.urgent { color: var(--bear); font-weight: 700; animation: blink 1s infinite; }
.oc-age.warn   { color: var(--warn); font-weight: 600; }

.oc-row2 { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 4px 0; }
.oc-side { font-family: var(--font-data); font-size: 13px; font-weight: 700; min-width: 32px; }
.oc-side.buy  { color: var(--bull); }
.oc-side.sell { color: var(--bear); }
.oc-symbol { font-family: var(--font-data); font-size: 13px; font-weight: 600; color: var(--text-primary); flex: 1; }
.oc-lots { font-family: var(--font-data); font-size: 14px; font-weight: 700; color: var(--text-primary); }
.oc-lots span { font-size: 10px; color: var(--text-muted); }
.oc-type { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 2px; padding: 1px 4px; }

.oc-notional { font-family: var(--font-data); font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.oc-notional.large { color: var(--gold); }

.oc-meta { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); line-height: 1.6; margin-bottom: 6px; }
.oc-meta span { color: var(--text-secondary); }
.oc-slip.pos { color: var(--bull); }
.oc-slip.neg { color: var(--bear); }
.oc-book-impact { font-family: var(--font-data); font-size: 10px; margin-bottom: 5px; }
.book-long  { color: var(--warn); }
.book-short { color: var(--bull); }

/* Card action buttons */
.oc-actions { display: flex; gap: 4px; }
.oc-btn {
  flex: 1; padding: 5px 4px; border-radius: 3px;
  font-family: var(--font-data); font-size: 10px; font-weight: 700;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-muted); cursor: pointer; text-align: center;
  transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.05em;
}
.oc-btn.accept { border-color: var(--bull-dim); color: var(--bull); }
.oc-btn.accept:hover { background: var(--bull-glow); box-shadow: 0 0 8px rgba(16,217,150,0.3); }
.oc-btn.reject { border-color: var(--bear-dim); color: var(--bear); }
.oc-btn.reject:hover { background: var(--bear-glow); box-shadow: 0 0 8px rgba(255,59,92,0.3); }
.oc-btn.requote { border-color: var(--warn-dim); color: var(--warn); }
.oc-btn.requote:hover { background: var(--warn-glow); }
.oc-shortcut { font-size: 8px; color: var(--text-dim); display: block; margin-top: 1px; }

/* Requote inline */
.requote-panel {
  margin-top: 6px; padding: 8px; background: var(--bg-elevated);
  border: 1px solid var(--warn-dim); border-radius: var(--radius);
  animation: slideDown 0.2s;
}
.requote-panel input { width: 100%; padding: 4px 8px; font-size: 13px; margin-bottom: 6px; }

/* Recent processed strip */
.recent-strip {
  border-top: 1px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0;
  max-height: 80px;
  overflow-y: auto;
}
.recent-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px; font-family: var(--font-data); font-size: 10px;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
}
.recent-item .check { color: var(--bull); font-weight: 700; }
.recent-item .cross { color: var(--bear); font-weight: 700; }

/* ─── CLIENT WATCHLIST ─────────────────────────────────────── */
.watchlist-section {
  flex-shrink: 0;
  border-top: 2px solid var(--border-bright);
  display: flex; flex-direction: column;
  height: 35%;
  min-height: 0;
}
.watchlist-scroll { flex: 1; overflow-y: auto; min-height: 0; }

.wl-row {
  display: flex; align-items: center;
  padding: 5px 10px; border-bottom: 1px solid var(--border);
  cursor: pointer; position: relative; transition: background 0.1s;
  font-family: var(--font-data);
}
.wl-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.wl-row.status-normal::before  { background: var(--bull); }
.wl-row.status-warning::before { background: var(--warn); animation: warn-pulse 2s infinite; }
.wl-row.status-call::before    { background: var(--bear); animation: warn-pulse 1s infinite; }
.wl-row:hover { background: var(--bg-elevated); }

.wl-row.status-warning { background: rgba(245,158,11,0.04); }
.wl-row.status-call    { background: rgba(255,59,92,0.06); animation: row-pulse-red 1.5s infinite; }

.wl-name { flex: 1; font-size: 11px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-left: 4px; }
.wl-equity { font-size: 11px; color: var(--text-secondary); min-width: 60px; text-align: right; }
.wl-margin { font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; }
.wl-margin.good   { color: var(--bull); }
.wl-margin.warn   { color: var(--warn); }
.wl-margin.danger { color: var(--bear); }
.wl-pnl { font-size: 11px; min-width: 50px; text-align: right; }
.wl-pnl.pos { color: var(--bull); }
.wl-pnl.neg { color: var(--bear); }
.wl-status-badge {
  font-size: 8px; font-weight: 700; padding: 1px 4px;
  border-radius: 2px; text-transform: uppercase; white-space: nowrap;
  margin-left: 5px;
}
.status-NORMAL    { background: none; color: var(--text-muted); }
.status-MARGIN_WARNING { background: var(--warn-glow); color: var(--warn); border: 1px solid var(--warn-dim); }
.status-MARGIN_CALL    { background: var(--bear-glow); color: var(--bear); border: 1px solid var(--bear-dim); }
.status-SUSPENDED      { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }

/* ═══════════════════════════════════════════════════════════
   PRICE BOARD
   ═══════════════════════════════════════════════════════════ */
.price-board {
  display: flex;
  overflow-x: auto;
  background: var(--bg-panel);
  border-bottom: 2px solid var(--border-bright);
  height: 200px;
  flex-shrink: 0;
  gap: 1px;
}
.price-board::-webkit-scrollbar { height: 3px; }

.price-tile {
  min-width: 220px; flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0;
  cursor: default;
  transition: background 0.1s;
  position: relative;
  overflow: hidden;
}
.price-tile:hover { background: var(--bg-elevated); }

/* Tile header */
.pt-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px 5px; border-bottom: 1px solid var(--border);
}
.pt-symbol { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text-primary); cursor: pointer; }
.pt-symbol:hover { color: var(--accent); }
.pt-badges { display: flex; gap: 4px; align-items: center; }
.pt-badge {
  font-family: var(--font-data); font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 2px; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.pt-badge.stp  { background: var(--bull-glow); color: var(--bull); border: 1px solid var(--bull-dim); }
.pt-badge.bbok { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
.pt-badge.off  { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }

/* Bid/Ask display */
.pt-prices {
  display: grid; grid-template-columns: 1fr 1fr;
  padding: 4px 6px; gap: 4px; flex: 1;
}
.pt-price-side {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 6px 8px; border-radius: var(--radius); cursor: pointer;
  background: var(--bg-elevated); border: 1px solid var(--border);
  transition: all 0.1s;
}
.pt-price-side:hover { border-color: var(--accent); }
.pt-price-side.bid:hover { background: var(--bear-glow); border-color: var(--bear-dim); }
.pt-price-side.ask:hover { background: var(--bull-glow); border-color: var(--bull-dim); }
.pt-price-side.flashing-up   { animation: flashBid 0.3s; }
.pt-price-side.flashing-down { animation: flashAsk 0.3s; }

.pt-label { font-family: var(--font-data); font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
.pt-label.bid { color: var(--bear); }
.pt-label.ask { color: var(--bull); }
.pt-num { font-family: var(--font-data); font-size: 18px; font-weight: 700; color: var(--text-primary); line-height: 1; white-space: nowrap; }
.pt-num .big { font-size: 22px; }
.pt-num .changed { color: var(--bull); transition: color 0.5s; }

/* Tile footer */
.pt-footer { padding: 5px 10px; border-top: 1px solid var(--border); background: var(--bg-panel); }
.pt-row { display: flex; justify-content: space-between; align-items: center; }
.pt-stat { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
.pt-stat span { color: var(--text-secondary); }
.pt-change.pos { color: var(--bull); font-family: var(--font-data); font-size: 10px; font-weight: 600; }
.pt-change.neg { color: var(--bear); font-family: var(--font-data); font-size: 10px; font-weight: 600; }
.pt-spread { font-family: var(--font-data); font-size: 10px; color: var(--text-secondary); }
.spread-val { color: var(--warn); font-weight: 600; }

/* Long/short ratio bar */
.ls-bar-wrap { padding: 4px 10px 5px; }
.ls-bar { height: 4px; background: var(--bear-dim); border-radius: 2px; overflow: hidden; margin-bottom: 2px; }
.ls-bar-fill { height: 100%; background: var(--bull); border-radius: 2px; transition: width 0.5s; }
.ls-info { display: flex; justify-content: space-between; font-family: var(--font-data); font-size: 9px; }
.ls-long { color: var(--bull); }
.ls-short { color: var(--bear); }

/* Net exposure */
.pt-exposure { padding: 0 10px 6px; font-family: var(--font-data); font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.exp-lots.pos { color: var(--warn); font-weight: 600; }
.exp-lots.neg { color: var(--accent); font-weight: 600; }
.exp-usd { color: var(--text-secondary); }

/* ═══════════════════════════════════════════════════════════
   CENTER BOTTOM — 6-TAB WORKSPACE
   ═══════════════════════════════════════════════════════════ */
.workspace {
  display: flex; flex-direction: column;
  background: var(--bg-base);
  overflow: hidden;
  min-height: 0;
}
.ws-tabs {
  display: flex; align-items: center;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  flex-shrink: 0;
  gap: 2px;
}
.ws-tab {
  padding: 9px 14px; font-family: var(--font-display); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  white-space: nowrap;
}
.ws-tab:hover { color: var(--text-secondary); }
.ws-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ws-content { flex: 1; overflow: hidden; min-height: 0; }
.ws-panel { height: 100%; overflow-y: auto; padding: 12px; display: none; }
.ws-panel.active { display: block; }

/* ─── DATA TABLES ─────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; font-family: var(--font-data); font-size: 11px; }
.data-table th {
  text-align: left; padding: 6px 8px; font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);
  border-bottom: 1px solid var(--border-bright); white-space: nowrap;
  background: var(--bg-surface); position: sticky; top: 0; z-index: 2;
}
.data-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
.data-table tr:hover td { background: var(--bg-elevated); }
.data-table tr.flash-new td { animation: rowFlashGreen 2s; }
.data-table tr.flash-red td { animation: rowFlashRed 0.5s; }

/* Cell types */
.cell-bull  { color: var(--bull); font-weight: 600; }
.cell-bear  { color: var(--bear); font-weight: 600; }
.cell-warn  { color: var(--warn); font-weight: 600; }
.cell-muted { color: var(--text-muted); }
.cell-mono  { font-family: var(--font-data); }

/* Route badge */
.route-badge { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 2px; text-transform: uppercase; }
.route-auto   { background: var(--accent-dim); color: var(--accent); }
.route-manual { background: var(--warn-glow); color: var(--warn); }
.route-stp    { background: var(--bull-glow); color: var(--bull); }
.route-timeout{ background: var(--bear-glow); color: var(--bear); }

/* Severity badge */
.sev-badge { font-family: var(--font-data); font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.sev-high   { background: var(--bear-glow); color: var(--bear); border: 1px solid var(--bear-dim); }
.sev-medium { background: var(--warn-glow); color: var(--warn); border: 1px solid var(--warn-dim); }
.sev-low    { background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border); }

/* ─── TAB 1: BOOK ─────────────────────────────────────────── */
.book-summary {
  display: flex; gap: 16px; padding: 8px 12px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px;
  font-family: var(--font-data); font-size: 11px;
}
.book-stat { display: flex; flex-direction: column; gap: 2px; }
.book-stat .bs-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
.book-stat .bs-val { font-size: 13px; font-weight: 700; color: var(--text-primary); }

.bbook-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 3px; }
.bbook-fill { background: var(--accent); }
.abook-fill { background: var(--bull); flex: 1; }

/* ─── TAB 3: RISK ─────────────────────────────────────────── */
.risk-gauges { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-bottom: 12px; }
.gauge-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px; text-align: center;
}
.gauge-symbol { font-family: var(--font-display); font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 4px; }
.gauge-ring { position: relative; width: 60px; height: 60px; margin: 0 auto 4px; }
.gauge-ring svg { transform: rotate(-90deg); }
.gauge-ring .track { stroke: var(--bg-elevated); stroke-width: 6; fill: none; }
.gauge-ring .fill  { stroke-width: 6; fill: none; stroke-linecap: round; transition: stroke-dashoffset 1s; }
.gauge-ring .fill.green  { stroke: var(--bull); }
.gauge-ring .fill.amber  { stroke: var(--warn); }
.gauge-ring .fill.red    { stroke: var(--bear); }
.gauge-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--font-data); }
.gauge-pct { font-size: 13px; font-weight: 700; line-height: 1; }
.gauge-sub { font-size: 8px; color: var(--text-muted); }
.gauge-vals { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); }

.risk-row2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.risk-panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; overflow: hidden; }
.risk-panel-title { font-family: var(--font-display); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 8px; }

.stress-table { width: 100%; border-collapse: collapse; font-family: var(--font-data); font-size: 11px; }
.stress-table th, .stress-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: center; }
.stress-table th { font-size: 9px; color: var(--text-muted); text-transform: uppercase; background: var(--bg-elevated); }

/* ─── TAB 5: SURVEILLANCE ─────────────────────────────────── */
.alert-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
  display: flex; gap: 10px; align-items: flex-start;
}
.alert-card.HIGH   { border-left: 3px solid var(--bear); background: rgba(255,59,92,0.03); }
.alert-card.MEDIUM { border-left: 3px solid var(--warn); }
.alert-card.LOW    { border-left: 3px solid var(--text-muted); }
.alert-card.DISMISSED { opacity: 0.4; }

.alert-type { font-family: var(--font-data); font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 2px; }
.alert-client { font-size: 11px; font-weight: 600; color: var(--text-primary); }
.alert-detail { font-size: 11px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
.alert-time { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.alert-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.btn-sm {
  padding: 3px 8px; border-radius: 2px; font-size: 10px; font-weight: 600;
  border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-elevated);
  cursor: pointer; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--bear); color: var(--bear); }

/* ─── TAB 6: CHAT ─────────────────────────────────────────── */
.chat-layout { display: grid; grid-template-columns: 160px 1fr 180px; height: 100%; gap: 0; }
.chat-channels { border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
.chat-channel-item {
  padding: 5px 12px; font-size: 12px; color: var(--text-muted); cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: all 0.1s;
}
.chat-channel-item:hover { background: var(--bg-elevated); color: var(--text-secondary); }
.chat-channel-item.active { background: var(--bg-active); color: var(--accent); }
.chat-channel-item .ch-hash { color: var(--text-dim); }
.chat-messages { padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { display: flex; gap: 8px; }
.chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-data); font-size: 9px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.chat-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.chat-author { font-weight: 600; font-size: 12px; }
.chat-time { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
.chat-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.chat-sidebar { border-left: 1px solid var(--border); padding: 10px; overflow-y: auto; }
.chat-sidebar-title { font-family: var(--font-display); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
.team-member { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.presence-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.presence-online { background: var(--bull); }
.presence-away   { background: var(--warn); }
.presence-offline{ background: var(--text-dim); }

/* ═══════════════════════════════════════════════════════════
   RIGHT RAIL
   ═══════════════════════════════════════════════════════════ */
.right-rail {
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  height: 100%;
}
.right-section {
  display: flex; flex-direction: column;
  border-bottom: 2px solid var(--border-bright);
  overflow: hidden;
  flex-shrink: 0;
}
.right-section-scroll { overflow-y: auto; flex: 1; min-height: 0; padding: 10px; }
.right-title {
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-secondary);
  padding: 7px 10px 5px; border-bottom: 1px solid var(--border);
  background: var(--bg-panel); flex-shrink: 0;
}

/* Quote desk */
.quote-symbol-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.quote-select { padding: 4px 8px; font-size: 12px; font-family: var(--font-data); width: 100%; margin-bottom: 6px; }
.quote-market { display: grid; grid-template-columns: 1fr auto 1fr; gap: 4px; align-items: center; text-align: center; margin-bottom: 8px; }
.quote-market-price { font-family: var(--font-data); font-size: 15px; font-weight: 700; padding: 5px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); }
.quote-market-price.bid { color: var(--bear); }
.quote-market-price.ask { color: var(--bull); }
.quote-market-spread { font-family: var(--font-data); font-size: 10px; color: var(--warn); text-align: center; }
.quote-input-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.quote-input-row label { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); text-transform: uppercase; width: 24px; flex-shrink: 0; }
.quote-input-row input { flex: 1; padding: 4px 8px; font-size: 13px; }
.pip-btn { padding: 3px 6px; font-family: var(--font-data); font-size: 10px; border: 1px solid var(--border); border-radius: 2px; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
.pip-btn:hover { border-color: var(--accent); color: var(--accent); }

.spread-btns { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
.spread-btn { padding: 3px 8px; border-radius: 2px; font-family: var(--font-data); font-size: 10px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; }
.spread-btn.normal { border-color: var(--bull-dim); color: var(--bull); }
.spread-btn:hover  { border-color: var(--accent); color: var(--accent); }
.spread-btn.narrow:hover { border-color: var(--bull-dim); color: var(--bull); }
.spread-btn.widen:hover  { border-color: var(--bear-dim); color: var(--bear); }

.btn-push-quote {
  width: 100%; padding: 8px; border-radius: var(--radius); margin-top: 6px;
  font-family: var(--font-data); font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; background: var(--accent); color: white; cursor: pointer;
  border: none; transition: all 0.15s;
}
.btn-push-quote:hover { background: #2563eb; box-shadow: 0 0 12px var(--accent-glow); }
.btn-revert { width: 100%; padding: 5px; border-radius: var(--radius); margin-top: 4px; font-family: var(--font-data); font-size: 11px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; }
.btn-revert:hover { border-color: var(--text-secondary); color: var(--text-secondary); }

/* LP panel */
.lp-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.lp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.lp-dot.connected { background: var(--bull); box-shadow: 0 0 6px var(--bull); animation: pulse-dot 2s infinite; }
.lp-dot.disconnected { background: var(--bear); }
.lp-name { font-family: var(--font-data); font-weight: 600; color: var(--text-primary); flex: 1; font-size: 12px; }
.lp-stat { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
.btn-reconnect { padding: 2px 7px; font-size: 10px; border: 1px solid var(--warn-dim); color: var(--warn); border-radius: 2px; cursor: pointer; font-family: var(--font-data); }

/* Delta hedge panel */
.delta-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-family: var(--font-data); font-size: 11px; }
.delta-symbol { color: var(--text-primary); font-weight: 600; min-width: 60px; }
.delta-val { color: var(--warn); font-weight: 600; }
.delta-val.flat { color: var(--bull); }
.btn-hedge-delta { padding: 2px 7px; font-size: 9px; border: 1px solid var(--accent-dim); color: var(--accent); border-radius: 2px; cursor: pointer; font-family: var(--font-data); white-space: nowrap; }
.btn-hedge-all {
  width: 100%; padding: 6px; margin-top: 8px; border-radius: var(--radius);
  font-family: var(--font-data); font-size: 11px; font-weight: 700; text-transform: uppercase;
  border: 1px solid var(--accent-dim); color: var(--accent); cursor: pointer;
  background: var(--accent-glow); transition: all 0.15s;
}
.btn-hedge-all:hover { background: var(--accent-dim); box-shadow: 0 0 10px var(--accent-glow); }

/* Events */
.event-card {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 10px; margin-bottom: 6px;
}
.event-card.high { border-left: 3px solid var(--bear); }
.event-card.medium { border-left: 3px solid var(--warn); }
.event-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.event-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.event-countdown { font-family: var(--font-data); font-size: 12px; font-weight: 700; color: var(--warn); }
.event-countdown.imminent { color: var(--bear); animation: blink 1s infinite; }
.event-meta { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); display: flex; gap: 10px; }
.event-action { margin-top: 5px; }
.btn-event { padding: 3px 8px; font-size: 10px; border: 1px solid var(--warn-dim); color: var(--warn); border-radius: 2px; cursor: pointer; font-family: var(--font-data); white-space: nowrap; }

.news-item { display: flex; align-items: flex-start; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.news-item:hover .news-headline { color: var(--accent); }
.news-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.news-dot.bull { background: var(--bull); }
.news-dot.bear { background: var(--bear); }
.news-dot.neutral { background: var(--text-muted); }
.news-content { flex: 1; }
.news-source { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
.news-headline { font-size: 11px; color: var(--text-secondary); line-height: 1.3; transition: color 0.15s; }
.news-time { font-family: var(--font-data); font-size: 9px; color: var(--text-dim); }

.caution-banner {
  padding: 6px 10px; background: rgba(245,158,11,0.12); border-bottom: 1px solid var(--warn-dim);
  font-family: var(--font-data); font-size: 10px; font-weight: 700; color: var(--warn);
  text-transform: uppercase; letter-spacing: 0.06em; text-align: center;
  animation: warn-pulse 2s infinite;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════
   BOTTOM STATUS BAR
   ═══════════════════════════════════════════════════════════ */
.status-bar {
  height: var(--bar-bottom); background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 0;
  overflow: hidden; z-index: 100;
}
.sb-item { display: flex; align-items: center; gap: 4px; padding: 0 8px; border-right: 1px solid var(--border); font-family: var(--font-data); font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.sb-item:first-child { padding-left: 0; }
.sb-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.sb-dot.ok { background: var(--bull); animation: pulse-dot 3s infinite; }
.sb-dot.err { background: var(--bear); animation: pulse-dot 1s infinite; }
.sb-val { color: var(--text-secondary); font-weight: 500; }
.sb-val.bull { color: var(--bull); }
.sb-val.bear { color: var(--bear); }
.sb-event { color: var(--warn); font-weight: 700; }

/* ═══════════════════════════════════════════════════════════
   OVERLAYS & MODALS
   ═══════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(6,8,10,0.85); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s;
}
.modal-box {
  background: var(--bg-panel); border: 1px solid var(--border-bright);
  border-radius: var(--radius-lg); padding: 24px; min-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: scaleIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--bear); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
.modal-body { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
.modal-input { width: 100%; padding: 8px 12px; font-size: 14px; font-family: var(--font-data); margin-bottom: 12px; border: 2px solid var(--bear-dim); }
.modal-input:focus { border-color: var(--bear); }
.modal-actions { display: flex; gap: 8px; }
.btn-modal-cancel { flex: 1; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-family: var(--font-data); }
.btn-modal-confirm { flex: 1; padding: 8px; border-radius: var(--radius); background: var(--bear); color: white; cursor: pointer; font-family: var(--font-data); font-weight: 700; text-transform: uppercase; border: none; }

/* Toast notifications */
.toast-container { position: fixed; top: 60px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
.toast {
  padding: 10px 14px; border-radius: var(--radius-lg);
  font-family: var(--font-data); font-size: 12px; min-width: 280px; max-width: 380px;
  display: flex; align-items: flex-start; gap: 10px;
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: auto; border: 1px solid;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.critical { background: rgba(20,8,8,0.95); border-color: var(--bear-dim); color: var(--bear); }
.toast.warning  { background: rgba(20,14,6,0.95); border-color: var(--warn-dim); color: var(--warn); }
.toast.success  { background: rgba(6,20,12,0.95); border-color: var(--bull-dim); color: var(--bull); }
.toast.info     { background: rgba(8,14,24,0.95); border-color: var(--accent-dim); color: var(--accent); }
.toast.exit     { animation: toastOut 0.3s forwards; }
.toast-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.toast-content { flex: 1; }
.toast-title { font-weight: 700; margin-bottom: 2px; }
.toast-msg { color: var(--text-secondary); font-size: 11px; }
.toast-close { cursor: pointer; color: var(--text-muted); font-size: 14px; flex-shrink: 0; }

/* Keyboard shortcut overlay */
.kb-overlay { position: fixed; inset: 0; background: rgba(6,8,10,0.9); z-index: 3000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s; }
.kb-box { background: var(--bg-panel); border: 1px solid var(--border-bright); border-radius: var(--radius-lg); padding: 28px 32px; min-width: 500px; }
.kb-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }
.kb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kb-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.kb-key { font-family: var(--font-data); font-size: 11px; font-weight: 700; background: var(--bg-elevated); border: 1px solid var(--border-bright); border-radius: 3px; padding: 2px 8px; color: var(--text-primary); min-width: 36px; text-align: center; flex-shrink: 0; }
.kb-desc { font-size: 12px; color: var(--text-secondary); }

/* ═══════════════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════════════ */
@keyframes pulse-dot {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes warn-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.6; }
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes slideInTop {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
@keyframes slideDown {
  from { transform: scaleY(0); transform-origin: top; opacity: 0; }
  to   { transform: scaleY(1); opacity: 1; }
}
@keyframes flashAccept {
  0%,100% { background: transparent; }
  30%  { background: rgba(16,217,150,0.3); }
}
@keyframes flashReject {
  0%,100% { background: transparent; }
  30%  { background: rgba(255,59,92,0.3); }
}
@keyframes flashBid {
  0%,100% { background: var(--bg-elevated); }
  50% { background: rgba(16,217,150,0.25); }
}
@keyframes flashAsk {
  0%,100% { background: var(--bg-elevated); }
  50% { background: rgba(255,59,92,0.25); }
}
@keyframes rowFlashGreen {
  0%   { background: rgba(16,217,150,0.2); }
  100% { background: transparent; }
}
@keyframes rowFlashRed {
  0%   { background: rgba(255,59,92,0.2); }
  100% { background: transparent; }
}
@keyframes row-pulse-red {
  0%,100% { background: rgba(255,59,92,0.06); }
  50% { background: rgba(255,59,92,0.12); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes toastOut {
  from { transform: translateX(0); opacity: 1; }
  to   { transform: translateX(120%); opacity: 0; }
}
@keyframes priceUp {
  0%,100% { color: var(--text-primary); }
  50% { color: var(--bull); text-shadow: 0 0 8px var(--bull); }
}
@keyframes priceDown {
  0%,100% { color: var(--text-primary); }
  50% { color: var(--bear); text-shadow: 0 0 8px var(--bear); }
}

/* ═══════════════════════════════════════════════════════════

.flex { display: flex; }

.text-xs { font-size: 10px; }
.text-sm { font-size: 11px; }
.text-right { text-align: right; }
.divider { height: 1px; background: var(--border); margin: 8px 0; }
.section-title {

  text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted);

}

const { useState, useEffect, useRef, useCallback } = React;



// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = (n, d = 2) => n?.toFixed(d) ?? "-";
const fmtMoney = (n) => n >= 1e6 ? `$${(n/1e6).toFixed(2)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(1)}K` : `$${n?.toFixed(0)}`;
const fmtLots = (n) => n?.toFixed(2) ?? "0.00";
const fmtPnl  = (n) => (n >= 0 ? "+" : "") + `$${Math.abs(n).toLocaleString()}`;

function useInterval(cb, ms) {
  const ref = useRef(cb);
  useEffect(() => { ref.current = cb; }, [cb]);
  useEffect(() => { const t = setInterval(() => ref.current(), ms); return () => clearInterval(t); }, [ms]);
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({ ticks, bullish }) {
  const w = 160, h = 28;
  if (!ticks || ticks.length < 2) return null;
  const mn = Math.min(...ticks), mx = Math.max(...ticks), range = mx - mn || 1;
  const pts = ticks.map((v, i) => {
    const x = (i / (ticks.length - 1)) * w;
    const y = h - ((v - mn) / range) * h;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg width={w} height={h} style={{ display: "block" }}>
      <polyline fill="none" stroke={bullish ? "var(--bull)" : "var(--bear)"} strokeWidth="1.5" points={pts} strokeOpacity="0.8" />
    </svg>
  );
}

// ─── GAUGE RING ────────────────────────────────────────────────────────────────
function GaugeRing({ pct, symbol, used, limit }) {
  const r = 24, circ = 2 * Math.PI * r;
  const fill = circ - (pct / 100) * circ;
  const color = pct < 60 ? "green" : pct < 80 ? "amber" : "red";
  return (
    <div className="gauge-card">
      <div className="gauge-symbol">{symbol}</div>
      <div className="gauge-ring">
        <svg width="56" height="56" viewBox="0 0 56 56">
          <circle className="track" cx="28" cy="28" r={r} />
          <circle className={`fill ${color}`} cx="28" cy="28" r={r}
            strokeDasharray={circ} strokeDashoffset={fill} />
        </svg>
        <div className="gauge-center">
          <span className={`gauge-pct cell-${color === "green" ? "bull" : color === "amber" ? "warn" : "bear"}`}>{pct}%</span>
        </div>
      </div>
      <div className="gauge-vals">{fmtMoney(used)} / {fmtMoney(limit)}</div>
    </div>
  );
}

        <button className="oc-btn accept" onClick={handleAccept}>✓ ACCEPT<span className="oc-shortcut">A</span></button>
        <button className="oc-btn requote" onClick={handleRequote}>~ REQUOTE<span className="oc-shortcut">Q</span></button>
        <button className="oc-btn reject" onClick={handleReject}>✗ REJECT<span className="oc-shortcut">R</span></button>
      </div>
      {showRequote && (
        <div className="requote-panel">
          <div style={{ fontSize: 10, color: "var(--warn)", marginBottom: 4, fontFamily: "var(--font-data)" }}>NEW QUOTE PRICE</div>
          <input value={reqPrice} onChange={e => setReqPrice(e.target.value)} />
          <div style={{ display: "flex", gap: 6 }}>
            <button className="btn-bulk requote" style={{ flex: 1, padding: "5px" }} onClick={() => { onRequote(order.id, parseFloat(reqPrice)); setShowRequote(false); }}>SEND REQUOTE</button>
            <button className="btn-bulk" style={{ flex: 1, padding: "5px" }} onClick={() => setShowRequote(false)}>CANCEL</button>
          </div>
        </div>
      )}
    </div>
  );
}

// LEFT RAIL
// ═══════════════════════════════════════════════════════════
function LeftRail({ orders, processed, clients, watchlistIds, onAccept, onReject, onRequote, onToast }) {
  const [focusedIdx, setFocusedIdx] = useState(0);
  const [autoAccept, setAutoAccept] = useState(false);

  const handleBulkAccept = () => {
    if (window.confirm(`Accept all ${orders.length} pending orders?`)) {
      orders.forEach(o => onAccept(o.id));
      onToast({ type: "success", icon: "✓", title: "BULK ACCEPT", msg: `${orders.length} orders accepted` });
    }
  };
  const handleBulkReject = () => {
    if (window.confirm(`Reject all ${orders.length} pending orders?`)) {
      orders.forEach(o => onReject(o.id));
      onToast({ type: "critical", icon: "✗", title: "BULK REJECT", msg: `${orders.length} orders rejected` });
    }
  };

  const watchlistClients = clients.filter(c => watchlistIds.includes(c.id))
    .sort((a, b) => a.margin - b.margin);

  return (
    <div className="left-rail">
      {/* Order Flow Header */}
      <div className="rail-header">
        <div className="rail-title">
          ORDER FLOW
          <span className={`count-badge ${orders.length > 10 ? "urgent" : ""}`}>{orders.length}</span>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10, fontFamily: "var(--font-data)", color: "var(--text-muted)", cursor: "pointer" }}>
          <input type="checkbox" checked={autoAccept} onChange={e => setAutoAccept(e.target.checked)} style={{ width: 12, height: 12 }} />
          AUTO
        </label>
      </div>

      {/* Bulk actions */}
      <div className="bulk-actions">
        <button className="btn-bulk accept" onClick={handleBulkAccept}>✓ ACCEPT ALL</button>
        <button className="btn-bulk reject" onClick={handleBulkReject}>✗ REJECT ALL</button>
        <button className="btn-bulk requote" onClick={() => onToast({ type: "warning", icon: "~", title: "REQUOTE ALL", msg: "Applying market + spread to all orders" })}>~ REQUOTE ALL</button>
      </div>

      {/* Order queue */}
      <div className="order-queue">
        {orders.length === 0 && (
          <div style={{ padding: 24, textAlign: "center", color: "var(--text-muted)", fontFamily: "var(--font-data)", fontSize: 12 }}>
            ✓ No pending orders
          </div>
        )}
        {orders.map((order, idx) => (
          <OrderCard
            key={order.id}
            order={order}
            focused={focusedIdx === idx}
            onAccept={onAccept}
            onReject={onReject}
            onRequote={onRequote}
          />
        ))}
      </div>

      {/* Recent processed */}
      <div className="recent-strip">
        {processed.slice(0, 6).map((p, i) => (
          <div key={i} className="recent-item">
            <span className={p.action === "ACCEPT" ? "check" : "cross"}>{p.action === "ACCEPT" ? "✓" : "✗"}</span>
            <span>#{p.clientId} {p.side} {p.lots} {p.symbol}</span>
            <span style={{ marginLeft: "auto", color: "var(--text-dim)" }}>{p.ago}</span>
          </div>
        ))}
      </div>

      {/* Watchlist */}
      <div className="watchlist-section">
        <div className="rail-header">
          <div className="rail-title">WATCHLIST <span className="count-badge">{watchlistIds.length}</span></div>
          <button className="btn-sm">+ ADD</button>
        </div>
        <div className="watchlist-scroll">
          {watchlistClients.map(c => {
            const statusMap = { "NORMAL": "normal", "MARGIN_WARNING": "warning", "MARGIN_CALL": "call", "SUSPENDED": "suspended" };
            const marginClass = c.margin > 50 ? "good" : c.margin > 30 ? "warn" : "danger";
            return (
              <div key={c.id} className={`wl-row status-${statusMap[c.status]}`}>
                <div className="wl-name" title={c.name}>{c.name}</div>
                <div className="wl-equity">{fmtMoney(c.equity)}</div>
                <div className={`wl-margin ${marginClass}`}>{c.margin}%</div>
                <div className={`wl-pnl ${c.floatPnl >= 0 ? "pos" : "neg"}`}>{fmtPnl(c.floatPnl)}</div>
                <span className={`wl-status-badge status-${c.status}`}>
                  {c.status === "MARGIN_CALL" ? "MCL" : c.status === "MARGIN_WARNING" ? "WRN" : ""}
                </span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// PRICE BOARD
// ═══════════════════════════════════════════════════════════
function PriceBoard({ prices, onTileClick, onToast }) {
  return (
    <div className="price-board">
      {prices.map((inst, idx) => (
        <PriceTile key={inst.symbol} inst={inst} idx={idx} onTileClick={onTileClick} onToast={onToast} />
      ))}
    </div>
  );
}

function PriceTile({ inst, idx, onTileClick, onToast }) {
  const [ticks, setTicks] = useState(() => Array(30).fill(inst.bid + Math.random() * 0.0002));
  const [bidFlash, setBidFlash] = useState(null);
  const [askFlash, setAskFlash] = useState(null);
  const prevBid = useRef(inst.bid);

  useEffect(() => {
    if (inst.bid !== prevBid.current) {
      const dir = inst.bid > prevBid.current ? "up" : "down";
      setBidFlash(dir);
      setTimeout(() => setBidFlash(null), 350);
      prevBid.current = inst.bid;
      setTicks(t => [...t.slice(1), inst.bid]);
    }
  }, [inst.bid]);

  const spread = ((inst.ask - inst.bid) * (inst.symbol.includes("JPY") ? 100 : inst.symbol.includes("BTC") ? 1 : 10000)).toFixed(1);
  const netLots = (inst.longLots || 23.4) - (inst.shortLots || 0);
  const longPct = Math.round(((inst.longLots || 23.4) / ((inst.longLots || 23.4) + (inst.shortLots || 12.1))) * 100);
  const isPos = netLots >= 0;

  const formatPrice = (price, symbol) => {
    if (symbol.includes("JPY")) return price.toFixed(3);
    if (symbol === "XAU/USD") return price.toFixed(2);
    if (symbol === "BTC/USD") return price.toFixed(1);
    if (symbol === "US500")   return price.toFixed(1);
    return price.toFixed(5);
  };

  const fmtPriceHighlight = (price, symbol) => {
    const str = formatPrice(price, symbol);
    if (symbol.includes("JPY") || symbol === "XAU/USD" || symbol === "BTC/USD" || symbol === "US500") {
      return <span className="pt-num"><span className="big">{str.slice(0, -1)}</span><span className="big">{str.slice(-1)}</span></span>;
    }
    return <span className="pt-num"><span>{str.slice(0, -2)}</span><span className="big">{str.slice(-2)}</span></span>;
  };

  return (
    <div className="price-tile" onClick={() => onTileClick && onTileClick(idx)}>
      <div className="pt-header">
        <span className="pt-symbol">{inst.symbol}</span>
        <div className="pt-badges">
          <span className={`pt-badge ${inst.routing === "STP" ? "stp" : "bbok"}`}>{inst.routing}</span>
          <span className={`pt-badge ${inst.bookRouting === "B" ? "bbok" : "stp"}`}>{inst.bookRouting}-BK</span>
        </div>
      </div>

      <div className="pt-prices">
        <div className={`pt-price-side bid ${bidFlash === "down" ? "flashing-down" : bidFlash === "up" ? "flashing-up" : ""}`}
          onClick={(e) => { e.stopPropagation(); onToast({ type: "info", icon: "▼", title: `SELL ${inst.symbol}`, msg: `Quick sell ticket opened at ${formatPrice(inst.bid, inst.symbol)}` }); }}>
          <span className="pt-label bid">BID · SELL</span>
          {fmtPriceHighlight(inst.bid, inst.symbol)}
        </div>
        <div className={`pt-price-side ask ${bidFlash === "up" ? "flashing-up" : ""}`}
          onClick={(e) => { e.stopPropagation(); onToast({ type: "info", icon: "▲", title: `BUY ${inst.symbol}`, msg: `Quick buy ticket opened at ${formatPrice(inst.ask, inst.symbol)}` }); }}>
          <span className="pt-label ask">ASK · BUY</span>
          {fmtPriceHighlight(inst.ask, inst.symbol)}
        </div>
      </div>

      <div className="pt-footer">
        <div className="pt-row">
          <span className="pt-stat">H: <span>{formatPrice(inst.high, inst.symbol)}</span> L: <span>{formatPrice(inst.low, inst.symbol)}</span></span>
          <span className={`pt-change ${inst.change >= 0 ? "pos" : "neg"}`}>{inst.change >= 0 ? "+" : ""}{inst.change}%</span>
        </div>
        <div className="pt-row" style={{ marginTop: 3 }}>
          <span className="pt-spread">Spd: <span className="spread-val">{spread}pts</span></span>
          <span className="pt-stat">Vol: <span>{(inst.volume / 1000).toFixed(1)}K</span></span>
        </div>
      </div>

      <div className="ls-bar-wrap">
        <div className="ls-bar"><div className="ls-bar-fill" style={{ width: `${longPct}%` }} /></div>
        <div className="ls-info">
          <span className="ls-long">▲ {longPct}% LONG</span>
          <span className="ls-short">▼ {100 - longPct}% SHORT</span>
        </div>
      </div>

      <div style={{ padding: "0 10px 8px" }}>
        <Sparkline ticks={ticks} bullish={inst.change >= 0} />
      </div>
    </div>
  );
}

// TAB 1: AGGREGATED BOOK

  const [expanded, setExpanded] = useState(null);

        <div className="book-stat"><span className="bs-label">Net Short</span><span className="bs-val cell-bear">{fmtMoney(totalShort)}</span></div>
        <div className="book-stat"><span className="bs-label">Book P&L</span><span className="bs-val cell-bull">+${totalPnl.toLocaleString()}</span></div>

            <th>B-Book / A-Book</th><th>Risk %</th>
          </tr>
        </thead>
        <tbody>
          {book.map(b => {
            const net = b.longLots - b.shortLots;
            const netUsd = net * (b.symbol === "XAU/USD" ? b.current * 100 : b.symbol === "US500" ? b.current * 10 : b.symbol === "BTC/USD" ? b.current : 100000);
            const pnl = net * (b.current - b.avgOpen) * (b.symbol.includes("JPY") ? 100 : b.symbol === "XAU/USD" ? 100 : b.symbol === "BTC/USD" ? 1 : 100000);
            const riskPct = Math.round(Math.max(b.longLots, b.shortLots) / b.limit * 100);
            const riskColor = riskPct > 80 ? "cell-bear" : riskPct > 60 ? "cell-warn" : "cell-bull";
            return (
              <tr key={b.symbol} onClick={() => setExpanded(expanded === b.symbol ? null : b.symbol)} style={{ cursor: "pointer" }}>

                <td className="cell-bear">{fmtLots(b.shortLots)}</td>
                <td className={net >= 0 ? "cell-bull" : "cell-bear"} style={{ fontWeight: 700 }}>{net >= 0 ? "+" : ""}{fmtLots(net)}</td>
                <td className={net >= 0 ? "cell-warn" : "cell-bull"}>{fmtMoney(Math.abs(netUsd))}</td>
                <td className="cell-mono cell-muted">{b.avgOpen.toFixed(b.symbol.includes("JPY") ? 3 : b.symbol === "XAU/USD" ? 2 : b.symbol === "BTC/USD" ? 1 : 5)}</td>
                <td className="cell-mono">{b.current.toFixed(b.symbol.includes("JPY") ? 3 : b.symbol === "XAU/USD" ? 2 : b.symbol === "BTC/USD" ? 1 : 5)}</td>
                <td className={pnl >= 0 ? "cell-bull" : "cell-bear"} style={{ fontWeight: 600 }}>{fmtPnl(Math.round(pnl))}</td>
                <td className="cell-muted">{b.clients}</td>
                <td className="cell-muted">{b.hedged}%</td>
                <td>
                  <div style={{ display: "flex", height: 8, width: 100, borderRadius: 2, overflow: "hidden" }}>
                    <div className="bbook-fill" style={{ width: `${b.bBook}%` }} />
                    <div className="abook-fill" style={{ width: `${b.aBook}%` }} />

                  <div style={{ fontSize: 9, fontFamily: "var(--font-data)", color: "var(--text-muted)", marginTop: 2 }}>{b.bBook}% / {b.aBook}%</div>
                </td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ height: 4, width: 50, background: "var(--bg-elevated)", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${riskPct}%`, background: riskPct > 80 ? "var(--bear)" : riskPct > 60 ? "var(--warn)" : "var(--bull)" }} />

                    <span className={riskColor}>{riskPct}%</span>
                  </div>
                </td>
              </tr>

      <div className="divider" style={{ margin: "12px 0" }} />
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <button className="btn-hedge-all" style={{ flex: 1 }} onClick={() => onToast({ type: "info", icon: "⚡", title: "DELTA HEDGE APPLIED", msg: "Sending hedge orders for all net exposures to LP1" })}>⚡ APPLY DELTA HEDGE</button>

  const scenarios = [
    { label: "±50 pip",  multiplier: 0.5 },
    { label: "±100 pip", multiplier: 1   },
    { label: "±200 pip", multiplier: 2   },

        {book.map(b => {
          const netLots = Math.max(b.longLots, b.shortLots);

          const usedUsd = netLots * (b.symbol === "XAU/USD" ? b.current * 100 : b.symbol === "US500" ? b.current * 10 : b.symbol === "BTC/USD" ? b.current : 100000);
          const limitUsd = b.limit * (b.symbol === "XAU/USD" ? b.current * 100 : b.symbol === "US500" ? b.current * 10 : b.symbol === "BTC/USD" ? b.current : 100000);
          return <GaugeRing key={b.symbol} pct={pct} symbol={b.symbol} used={usedUsd} limit={limitUsd} />;
        })}

      {/* Three panels */}
      <div className="risk-row2">
        <div className="risk-panel">
          <div className="risk-panel-title">⚠ Margin Watch ({marginCallClients.length})</div>

            return (
              <tr key={b.symbol}>
                <td style={{ fontWeight: 700 }}>{b.symbol}</td>

                  const impact = net * s.multiplier * pipVal;
                  return <td key={s.label} className={impact >= 0 ? "cell-bull" : "cell-bear"}>{fmtPnl(Math.round(impact))}</td>;

// TAB 5: SURVEILLANCE

function SurveillanceTab({ alerts, onToast }) {

  const flag    = (id) => setLocalAlerts(a => a.map(x => x.id === id ? {...x, status: "FLAGGED"} : x));

  const activeAlerts  = localAlerts.filter(a => a.status === "ACTIVE" || a.status === "FLAGGED");
  const highCount     = activeAlerts.filter(a => a.severity === "HIGH").length;
  const restrictions  = [
    { client: "Chen Wei (#4450)", type: "SLOW EXECUTION", by: "M.Chen", since: "14:22", reason: "Latency arbitrage suspected" },
    { client: "Anna Kowalski (#7841)", type: "REQUIRE MANUAL", by: "System", since: "14:21", reason: "Account coordination pattern" },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 12, height: "100%" }}>
      <div>
        <div className="section-title">
          LIVE ALERT FEED — {activeAlerts.length} ACTIVE
          {highCount > 0 && <span style={{ marginLeft: 8, color: "var(--bear)", fontWeight: 700 }}>({highCount} HIGH SEVERITY)</span>}

        {localAlerts.map(a => (
          <div key={a.id} className={`alert-card ${a.severity} ${a.status === "DISMISSED" ? "DISMISSED" : ""}`}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span className={`sev-badge sev-${a.severity.toLowerCase()}`}>{a.severity}</span>
                <span className="alert-type">{a.type}</span>
                <span style={{ marginLeft: "auto", fontFamily: "var(--font-data)", fontSize: 10, color: "var(--text-muted)" }}>{a.time}</span>
              </div>
              <div className="alert-client">Client #{a.clientId} — {a.clientName}</div>
              <div className="alert-detail">{a.detail}</div>
            </div>
            {a.status !== "DISMISSED" && (
              <div className="alert-actions">
                <button className="btn-sm" onClick={() => onToast({ type: "info", icon: "🔍", title: "INVESTIGATING", msg: `Opening investigation for ${a.clientName}` })}>INVESTIGATE</button>
                <button className="btn-sm" onClick={() => flag(a.id)}>FLAG</button>
                <button className="btn-sm" onClick={() => dismiss(a.id)}>DISMISS</button>
                <button className="btn-sm danger" onClick={() => onToast({ type: "warning", icon: "🔒", title: "TRADING RESTRICTED", msg: `Restrictions applied to ${a.clientName}` })}>RESTRICT</button>
              </div>
            )}

      <div>
        <div className="section-title">ACTIVE RESTRICTIONS</div>

          <div key={i} style={{ background: "var(--bg-surface)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "8px 10px", marginBottom: 6 }}>
            <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 3 }}>{r.client}</div>
            <div style={{ fontFamily: "var(--font-data)", fontSize: 10, color: "var(--warn)", marginBottom: 2 }}>{r.type}</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)", marginBottom: 4 }}>{r.reason}</div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: "var(--font-data)", fontSize: 10, color: "var(--text-dim)" }}>Since {r.since} · by {r.by}</span>
