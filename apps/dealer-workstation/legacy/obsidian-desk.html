  const [selectedSymbol, setSelectedSymbol] = useState("EUR/USD");
  const inst = INSTRUMENTS.find(i => i.symbol === selectedSymbol) || INSTRUMENTS[0];

  const upcomingEvents = events.filter(e => e.minutesAway > 0).sort((a,b) => a.minutesAway - b.minutesAway);

  const bookPos = BOOK_POSITIONS.find(b => b.symbol === selectedSymbol);

  return (
    <div className="right-rail">
      {cautionMode && (
        <div className="caution-banner">⚡ CAUTION MODE: CPI RELEASE IN {events[0]?.minutesAway}m — SPREADS WIDENED</div>
      )}

      {/* Quote Desk */}
      <div className="right-section" style={{ height: "35%" }}>
        <div className="right-title">MANUAL QUOTE DESK</div>
        <div className="right-section-scroll">
          <select className="quote-select" value={selectedSymbol} onChange={e => setSelectedSymbol(e.target.value)}>
            {INSTRUMENTS.map(i => <option key={i.symbol}>{i.symbol}</option>)}
          </select>

          <div className="quote-market">
            <div>
              <div className="quote-market-price bid">{inst.bid.toFixed(inst.symbol.includes("JPY") ? 3 : inst.symbol === "XAU/USD" ? 2 : 5)}</div>
              <div style={{ fontSize: 9, textAlign: "center", color: "var(--bear)", fontFamily: "var(--font-data)", marginTop: 2 }}>BID</div>
            </div>
            <div style={{ textAlign: "center" }}>
              <div className="quote-market-spread">SPREAD</div>
              <div style={{ fontFamily: "var(--font-data)", fontSize: 11, color: "var(--warn)", fontWeight: 700 }}>
                {(( inst.ask - inst.bid) * (inst.symbol.includes("JPY") ? 100 : 10000)).toFixed(1)}pts
              </div>
            </div>
            <div>
              <div className="quote-market-price ask">{inst.ask.toFixed(inst.symbol.includes("JPY") ? 3 : inst.symbol === "XAU/USD" ? 2 : 5)}</div>
              <div style={{ fontSize: 9, textAlign: "center", color: "var(--bull)", fontFamily: "var(--font-data)", marginTop: 2 }}>ASK</div>
            </div>
          </div>

          <div className="spread-btns">
            {["-0.5 pips", "NORMAL", "+0.5 pips", "+2 pips", "+5 pips"].map((s, i) => (
              <button key={s} className={`spread-btn ${i === 1 ? "normal" : i < 1 ? "narrow" : "widen"}`}
                onClick={() => onToast({ type: i > 2 ? "warning" : "info", icon: "⚡", title: "SPREAD ADJUSTED", msg: `${selectedSymbol} spread: ${s}` })}>
                {s}
              </button>
            ))}
          </div>

          <div style={{ fontFamily: "var(--font-data)", fontSize: 10, color: "var(--text-muted)", margin: "4px 0 2px" }}>AFFECT:</div>
          <select style={{ width: "100%", padding: "3px 8px", fontSize: 11, marginBottom: 6 }}>
            <option>ALL CLIENTS</option><option>Retail only</option><option>Pro only</option><option>VIP only</option>
          </select>

          <button className="btn-push-quote" onClick={() => onToast({ type: "success", icon: "✓", title: "QUOTE PUSHED", msg: `Manual prices pushed for ${selectedSymbol} to all clients` })}>
            ▲ PUSH QUOTE TO CLIENTS
          </button>
          <button className="btn-revert" onClick={() => onToast({ type: "info", icon: "↩", title: "REVERTED", msg: `${selectedSymbol} reverted to market feed` })}>
            ↩ REVERT TO MARKET
          </button>
        </div>
      </div>

      {/* Hedge Panel */}
      <div className="right-section" style={{ height: "35%" }}>
        <div className="right-title">LP STATUS & HEDGING</div>
        <div className="right-section-scroll">
          {lpStatus.map(lp => (
            <div key={lp.id} className="lp-row">
              <div className={`lp-dot ${lp.status.toLowerCase()}`} />
              <span className="lp-name">{lp.id} — {lp.name}</span>
              {lp.latency && <span className="lp-stat">{lp.latency}ms</span>}
              {lp.status === "DISCONNECTED"
                ? <button className="btn-reconnect" onClick={() => onToast({ type: "info", icon: "🔄", title: "RECONNECTING", msg: `Attempting to reconnect to ${lp.name}...` })}>RECONNECT</button>
                : <span className="lp-stat" style={{ color: "var(--bull)" }}>↑{lp.uptime}%</span>
              }
            </div>
          ))}

          <div className="divider" />
          <div style={{ fontFamily: "var(--font-display)", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: 6 }}>DELTA EXPOSURE</div>

          {BOOK_POSITIONS.map(b => {
            const net = b.longLots - b.shortLots;
            const isFlat = Math.abs(net) < 2;
            return (
              <div key={b.symbol} className="delta-row">
                <span className="delta-symbol">{b.symbol}</span>
                <span className={`delta-val ${isFlat ? "flat" : ""}`}>
                  {isFlat ? "~FLAT" : `${net >= 0 ? "▲" : "▼"} ${Math.abs(net).toFixed(1)} lots`}
                </span>
                {!isFlat && (
                  <button className="btn-hedge-delta" onClick={() => onToast({ type: "success", icon: "⚡", title: "HEDGE SENT", msg: `${b.symbol}: ${Math.abs(net).toFixed(1)} lots → LP1` })}>
                    HEDGE {b.id}
                  </button>
                )}
              </div>
            );
          })}

          <button className="btn-hedge-all" onClick={() => onToast({ type: "success", icon: "⚡", title: "ALL DELTAS HEDGED", msg: "Hedge orders submitted for all net exposures" })}>
            ⚡ HEDGE ALL DELTAS
          </button>
        </div>
      </div>

      {/* Events & News */}
      <div className="right-section" style={{ flex: 1, borderBottom: "none" }}>
        <div className="right-title">EVENTS & NEWS</div>
        <div className="right-section-scroll">
          {upcomingEvents.slice(0, 3).map(e => (
            <div key={e.id} className={`event-card ${e.impact.toLowerCase()}`}>
              <div className="event-top">
                <span className="event-name">{e.flag} {e.name}</span>
                <span className={`event-countdown ${e.minutesAway < 10 ? "imminent" : ""}`}>
                  {e.minutesAway}m
                </span>
              </div>
              <div className="event-meta">
                <span>Prev: {e.previous || "—"}</span>
                <span>Fcst: {e.forecast || "—"}</span>
                <span>{e.impact}</span>
              </div>
              {e.impact === "HIGH" && (
                <div className="event-action">
                  <button className="btn-event" onClick={() => onToast({ type: "warning", icon: "⚡", title: "CAUTION MODE ON", msg: `EUR/USD spread widened for ${e.name}` })}>
                    ⚡ WIDEN {e.name.split(" ")[0]}
                  </button>
                </div>
              )}
            </div>
          ))}

          <div className="divider" />
          <div style={{ fontFamily: "var(--font-display)", fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: "var(--text-muted)", marginBottom: 6 }}>NEWS FEED</div>

          {news.map(n => (
            <div key={n.id} className="news-item">
              <div className={`news-dot ${n.sentiment}`} />
              <div className="news-content">
                <div className="news-source">{n.source} · {n.time}</div>
                <div className="news-headline">{n.headline}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// BOTTOM STATUS BAR
// ═══════════════════════════════════════════════════════════
function StatusBar({ bookPnl, lpStatus, shiftSecs }) {
  const shiftH = Math.floor(shiftSecs / 3600);
  const shiftM = Math.floor((shiftSecs % 3600) / 60);
  const nextEvent = ECONOMIC_EVENTS.find(e => e.minutesAway > 0);
  return (
    <div className="status-bar">
      <div className="sb-item"><span className="sb-dot ok" /><span className="sb-val">OB-LIVE-01</span></div>
      {lpStatus.map(lp => (
        <div key={lp.id} className="sb-item">
          <span className={`sb-dot ${lp.status === "CONNECTED" ? "ok" : "err"}`} />
          <span className="sb-val">{lp.id}: {lp.name}</span>
        </div>
      ))}
      <div className="sb-item"><span className="sb-dot ok" /><span className="sb-val">FIX: ACTIVE</span></div>
      <div className="sb-item">Orders: <span className="sb-val">247 today</span></div>
      <div className="sb-item">Positions: <span className="sb-val">89</span></div>
      <div className="sb-item">Book P&L: <span className={`sb-val ${bookPnl >= 0 ? "bull" : "bear"}`}>{fmtPnl(bookPnl)}</span></div>
      <div className="sb-item">STP Ratio: <span className="sb-val">67%</span></div>
      {nextEvent && (
        <div className="sb-item">Next: <span className="sb-event">{nextEvent.name} {nextEvent.time} — {nextEvent.minutesAway}m</span></div>
      )}
      <div className="sb-item" style={{ marginLeft: "auto", borderRight: "none" }}>
        Dealer: <span className="sb-val">Marcus Chen</span> · Shift: <span className="sb-val">{String(shiftH).padStart(2,"0")}:{String(shiftM).padStart(2,"0")}</span> · Break: <span className="sb-val">16:30</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN WORKSPACE TABS
// ═══════════════════════════════════════════════════════════
function WorkspaceTabs({ book, executions, clients, alerts, onToast }) {
  const [activeTab, setActiveTab] = useState("book");
  const tabs = [
    { id: "book",         label: "BOOK" },
    { id: "executions",   label: "EXECUTIONS" },
    { id: "risk",         label: "RISK" },
    { id: "clients",      label: "CLIENTS" },
    { id: "surveillance", label: "SURVEILLANCE" },
    { id: "chat",         label: "CHAT" },
  ];
  return (
    <div className="workspace">
      <div className="ws-tabs">
        {tabs.map(t => (
          <button key={t.id} className={`ws-tab ${activeTab === t.id ? "active" : ""}`} onClick={() => setActiveTab(t.id)}>
            {t.label}
            {t.id === "surveillance" && alerts.filter(a => a.severity === "HIGH").length > 0 && (
              <span style={{ marginLeft: 6, background: "var(--bear)", color: "white", borderRadius: 10, padding: "0 5px", fontSize: 9 }}>
                {alerts.filter(a => a.severity === "HIGH").length}
              </span>
            )}
          </button>
        ))}
      </div>
      <div className="ws-content">
        <div className={`ws-panel ${activeTab === "book" ? "active" : ""}`}>
          <BookTab book={book} onToast={onToast} />
        </div>
        <div className={`ws-panel ${activeTab === "executions" ? "active" : ""}`}>
          <ExecutionsTab executions={executions} />
        </div>
        <div className={`ws-panel ${activeTab === "risk" ? "active" : ""}`}>
          <RiskTab book={book} clients={clients} />
        </div>
        <div className={`ws-panel ${activeTab === "clients" ? "active" : ""}`}>
          <ClientsTab clients={clients} onToast={onToast} />
        </div>
        <div className={`ws-panel ${activeTab === "surveillance" ? "active" : ""}`}>
          <SurveillanceTab alerts={alerts} onToast={onToast} />
        </div>
        <div className={`ws-panel ${activeTab === "chat" ? "active" : ""}`} style={{ padding: 0 }}>
          <ChatTab messages={CHAT_MESSAGES} />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════
const App = function DealerDesk() {
  // ── Clock & shift ───────────────────────────────────────
  const [clock, setClock]         = useState("");
  const [shiftSecs, setShiftSecs] = useState(13320); // 3h 42m

  useInterval(() => {
    const now = new Date();
    setClock(now.toUTCString().split(" ")[4]);
    setShiftSecs(s => s + 1);
  }, 1000);

  // ── Price ticking ───────────────────────────────────────
  const [prices, setPrices] = useState(
    INSTRUMENTS.map(i => ({ ...i }))
  );

  useInterval(() => {
    setPrices(prev =>
      prev.map(inst => {
        const move  = (Math.random() - 0.499) * inst.pip * 3;
        const newBid = +(inst.bid + move).toFixed(inst.digits);
        const newAsk = +(newBid + (inst.ask - inst.bid)).toFixed(inst.digits);
        return { ...inst, bid: newBid, ask: newAsk };
      })
    );
  }, 700);

  // ── Pending orders with live age ────────────────────────
  const [orders, setOrders] = useState(
    PENDING_ORDERS.map(o => ({ ...o, displayAge: o.age }))
  );
  const [processed, setProcessed] = useState([]);

  useInterval(() => {
    setOrders(prev => prev.map(o => ({ ...o, displayAge: +(o.displayAge + 0.1).toFixed(1) })));
  }, 100);

  // ── Book (live float) ───────────────────────────────────
  const [book, setBook] = useState(BOOK_POSITIONS.map(b => ({ ...b })));

  useInterval(() => {
    setBook(prev =>
      prev.map((b, i) => ({
        ...b,
        current: +(b.current + (Math.random() - 0.499) * b.current * 0.00005).toFixed(
          b.symbol.includes("JPY") ? 3 : b.symbol === "XAU/USD" || b.symbol === "US500" ? 1 : 5
        ),
      }))
    );
  }, 900);

  // ── Book P&L ────────────────────────────────────────────
  const [bookPnl, setBookPnl] = useState(12847);
  useInterval(() => {
    setBookPnl(p => p + Math.round((Math.random() - 0.45) * 120));
  }, 1800);

  // ── Latency simulation ──────────────────────────────────
  const [latency, setLatency] = useState(4);
  useInterval(() => {
    setLatency(Math.max(3, Math.min(18, latency + Math.round((Math.random() - 0.5) * 3))));
  }, 2000);

  // ── Global state ────────────────────────────────────────
  const [autoHedge,   setAutoHedge]   = useState(false);
  const [stpMode,     setStpMode]     = useState("MIXED");
  const [modal,       setModal]       = useState(null);
  const [showKb,      setShowKb]      = useState(false);
  const [toasts,      setToasts]      = useState([]);
  const [cautionMode, setCautionMode] = useState(true); // CPI in 7 min

  const marginCalls = CLIENTS.filter(c => c.status === "MARGIN_CALL").length;
  const alertCount  = SURVEILLANCE_ALERTS.filter(a => a.status !== "DISMISSED").length;

  // ── Toast helpers ────────────────────────────────────────
  const addToast = useCallback((t) => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev.slice(-4), { ...t, id }]);
    setTimeout(() => {
      setToasts(prev => prev.map(x => x.id === id ? { ...x, exiting: true } : x));
      setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 350);
    }, 5000);
  }, []);

  const dismissToast = (id) => {
    setToasts(prev => prev.map(x => x.id === id ? { ...x, exiting: true } : x));
    setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), 350);
  };

  // ── Order actions ────────────────────────────────────────
  const acceptOrder = useCallback((id) => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    setOrders(prev => prev.filter(x => x.id !== id));
    setProcessed(prev => [{
      action: "ACCEPT", clientId: o.clientId, side: o.side,
      lots: o.lots.toFixed(2), symbol: o.symbol, ago: "just now"
    }, ...prev.slice(0, 5)]);
    addToast({ type: "success", icon: "✓", title: `ORDER ACCEPTED`, msg: `${o.side} ${o.lots} ${o.symbol} @ ${o.clientPrice} — #${o.clientId}` });
  }, [orders, addToast]);

  const rejectOrder = useCallback((id) => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    setOrders(prev => prev.filter(x => x.id !== id));
    setProcessed(prev => [{
      action: "REJECT", clientId: o.clientId, side: o.side,
      lots: o.lots.toFixed(2), symbol: o.symbol, ago: "just now"
    }, ...prev.slice(0, 5)]);
    addToast({ type: "critical", icon: "✗", title: `ORDER REJECTED`, msg: `${o.side} ${o.lots} ${o.symbol} — #${o.clientId}` });
  }, [orders, addToast]);

  const requoteOrder = useCallback((id, newPrice) => {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    setOrders(prev => prev.filter(x => x.id !== id));
    addToast({ type: "warning", icon: "~", title: `REQUOTE SENT`, msg: `${o.symbol} new price ${newPrice} → #${o.clientId} (10s validity)` });
  }, [orders, addToast]);

  // ── Emergency modal actions ──────────────────────────────
  const handleEmergency = (action) => setModal(action);
  const confirmEmergency = () => {
    const msgs = {
      HALT:    { title: "HALT ACTIVATED",      msg: "All auto-accepts frozen. Manual only mode." },
      WIDEN:   { title: "SPREADS WIDENED",      msg: "Emergency 3× spread multiplier applied globally." },
      SUSPEND: { title: "TRADING SUSPENDED",    msg: "All new orders disabled across platform." },
      FLATTEN: { title: "BOOK BEING FLATTENED", msg: "Hedge orders submitted for all net exposures." },
    };
    const cfg = msgs[modal];
    addToast({ type: "critical", icon: "⚠", title: cfg.title, msg: cfg.msg });
    setModal(null);
  };

  // ── Simulate incoming orders ─────────────────────────────
  useInterval(() => {
    if (orders.length < 6 && Math.random() > 0.6) {
      const templates = [
        { clientId: 9999, clientName: "Alex Rivera",   tier: "PRO",    side: "BUY",  symbol: "EUR/USD", lots: 2.0,  type: "MARKET", notional: 216912 },
        { clientId: 8888, clientName: "Hana Yoshida",  tier: "RETAIL", side: "SELL", symbol: "GBP/USD", lots: 0.5,  type: "MARKET", notional: 63406  },
        { clientId: 7777, clientName: "Luca Ferrari",  tier: "VIP",    side: "BUY",  symbol: "XAU/USD", lots: 3.0,  type: "MARKET", notional: 695745 },
      ];
      const t = templates[Math.floor(Math.random() * templates.length)];
      const newOrder = {
        ...t,
        id: `ORD-${Date.now()}`,
        time: new Date().toISOString().substr(11, 12),
        age: 0,
        displayAge: 0,
        marketPrice: prices.find(p => p.symbol === t.symbol)?.bid || 1.08452,
        clientPrice: (prices.find(p => p.symbol === t.symbol)?.ask || 1.08458),
        slippage: +(Math.random() * 0.6 - 0.2).toFixed(1),
      };
      setOrders(prev => [newOrder, ...prev]);
      addToast({ type: "warning", icon: "📥", title: "NEW ORDER", msg: `${t.side} ${t.lots} ${t.symbol} — ${t.clientName} (${t.tier})` });
    }
  }, 8000);

  // ── Keyboard shortcuts ───────────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT" || e.target.tagName === "TEXTAREA") return;
      if (e.key === "?" || e.key === "/") { e.preventDefault(); setShowKb(true); }
      if (e.key === "Escape") { setShowKb(false); setModal(null); }
      if (e.key === "a" || e.key === "A") { if (orders[0]) acceptOrder(orders[0].id); }
      if (e.key === "r" || e.key === "R") { if (orders[0]) rejectOrder(orders[0].id); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [orders, acceptOrder, rejectOrder]);

  // ── Startup toasts ───────────────────────────────────────
  useEffect(() => {
    setTimeout(() => addToast({ type: "critical",  icon: "🔴", title: "MARGIN CALL",  msg: "Anna Kowalski #7841 — margin at 22%. Auto-close threshold: 20%" }), 1200);
    setTimeout(() => addToast({ type: "critical",  icon: "⚠",  title: "HIGH ALERT",   msg: "Latency arbitrage detected — Chen Wei #4450. Review required." }), 2400);
    setTimeout(() => addToast({ type: "warning",   icon: "📅", title: "EVENT ALERT",  msg: "US CPI YoY in 7 minutes. Consider widening EUR/USD spreads." }), 3600);
    setTimeout(() => addToast({ type: "critical",  icon: "🔌", title: "LP DISCONNECTED", msg: "LP3 Currenex connection lost. Failover to LP1/LP2 active." }), 4800);
  }, []);

  // ── Render ───────────────────────────────────────────────
  return (
    <div className="desk-shell">
      {/* Top command bar */}
      <CommandBar
        clock={clock}
        shiftSecs={shiftSecs}
        latency={latency}
        autoHedge={autoHedge}
        setAutoHedge={setAutoHedge}
        stpMode={stpMode}
        setStpMode={setStpMode}
        alertCount={alertCount}
        bbookExposure={2400000}
        marginCalls={marginCalls}
        onEmergency={handleEmergency}
        onShowAlerts={() => addToast({ type: "warning", icon: "🔔", title: "ALERTS", msg: `${alertCount} active alerts — check Surveillance tab` })}
      />

      {/* Main body */}
      <div className="desk-body">
        {/* Left rail */}
        <LeftRail
          orders={orders}
          processed={processed}
          clients={CLIENTS}
          watchlistIds={WATCHLIST_CLIENT_IDS}
          onAccept={acceptOrder}
          onReject={rejectOrder}
          onRequote={requoteOrder}
          onToast={addToast}
        />

        {/* Center */}
        <div className="desk-center">
          <PriceBoard prices={prices} onToast={addToast} />
          <WorkspaceTabs
            book={book}
            executions={EXECUTIONS}
            clients={CLIENTS}
            alerts={SURVEILLANCE_ALERTS}
            onToast={addToast}
          />
        </div>

        {/* Right rail */}
        <RightRail
          lpStatus={LP_STATUS}
          events={ECONOMIC_EVENTS}
          news={NEWS_ITEMS}
          cautionMode={cautionMode}
          onToast={addToast}
        />
      </div>

      {/* Bottom status bar */}
      <StatusBar bookPnl={bookPnl} lpStatus={LP_STATUS} shiftSecs={shiftSecs} />

      {/* Overlays */}
      {modal && (
        <ConfirmModal
          action={modal}
          onConfirm={confirmEmergency}
          onCancel={() => setModal(null)}
        />
      )}
      {showKb && <KbOverlay onClose={() => setShowKb(false)} />}

      {/* Toast stack */}
      <ToastContainer toasts={toasts} onDismiss={dismissToast} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
