<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Obsidian — The Trading Platform Brokers Deserve</title>
<meta name="description" content="White-label the full-stack trading infrastructure. From matching engine to mobile app — launch your branded broker in weeks, not years."/>
<meta name="theme-color" content="#06080A"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:#06080A;--bg1:#0C0E12;--bg2:#0F1216;--bg3:#141820;
  --tx:#E2E8F0;--tx2:#8B95A3;--tx3:#4A5568;
  --ac:#3B82F6;--bull:#10D996;--bear:#FF3B5C;--gold:#F59E0B;--purple:#8B5CF6;
  --br:#1C2028;--br2:#252C38;
  --fd:'Syne',sans-serif;--fm:'IBM Plex Mono',monospace;--fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);line-height:1.65;overflow-x:hidden;cursor:none}
@media(hover:none){body{cursor:auto}}
a{color:inherit;text-decoration:none}button{font-family:inherit}
::selection{background:rgba(59,130,246,.25);color:var(--tx)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
section[id]{scroll-margin-top:80px}
.fd{font-family:var(--fd)}.fm{font-family:var(--fm);font-feature-settings:"tnum"}.fb{font-family:var(--fb)}

/* ── CURSOR ─────────────────────────────────────────────────── */
#obs-cursor{position:fixed;top:0;left:0;width:8px;height:8px;border:1.5px solid var(--ac);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width 180ms var(--ease),height 180ms var(--ease),background 180ms ease,border-radius 150ms ease,border-color 180ms ease}
#obs-cursor.xl{width:36px;height:36px;background:rgba(59,130,246,.12)}
#obs-cursor.cross{width:22px;height:22px;border-radius:3px}
#obs-dot{position:fixed;top:0;left:0;width:3px;height:3px;background:var(--ac);border-radius:50%;pointer-events:none;z-index:100000;transform:translate(-50%,-50%)}

/* ── NOISE ──────────────────────────────────────────────────── */
#noise{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.032;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E") repeat;background-size:128px}

/* ── GRID ────────────────────────────────────────────────────── */
.grid-bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.grid-bg::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to right,var(--br) 0,transparent 1px,transparent 60px);opacity:.35}
.grid-bg::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(to bottom,var(--br) 0,transparent 1px,transparent 60px);opacity:.18}

/* ── REVEAL ──────────────────────────────────────────────────── */
.rev{opacity:0;transform:translateY(28px) scale(.97);transition:opacity 620ms var(--ease),transform 620ms var(--ease);will-change:opacity,transform}
.rev.on{opacity:1;transform:none}
.stagger>*:nth-child(1){transition-delay:0ms}.stagger>*:nth-child(2){transition-delay:80ms}.stagger>*:nth-child(3){transition-delay:160ms}.stagger>*:nth-child(4){transition-delay:240ms}.stagger>*:nth-child(5){transition-delay:320ms}.stagger>*:nth-child(6){transition-delay:400ms}.stagger>*:nth-child(7){transition-delay:480ms}.stagger>*:nth-child(8){transition-delay:560ms}.stagger>*:nth-child(9){transition-delay:640ms}

/* ── KEYFRAMES ──────────────────────────────────────────────── */
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.5),0 0 10px var(--ac)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0),0 0 18px var(--ac)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes ticker-run{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes caret{0%,100%{opacity:1}50%{opacity:0}}
@keyframes flash-bull{0%,100%{color:var(--tx)}25%{color:var(--bull)}}
@keyframes flash-bear{0%,100%{color:var(--tx)}25%{color:var(--bear)}}
@keyframes lat-travel{0%{left:0;opacity:0}5%{opacity:1}95%{opacity:1}100%{left:100%;opacity:0}}
@keyframes dash-flow{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}

/* ── 3D SPECIFIC ─────────────────────────────────────────────── */

/* CSS Particle fallback (Tier 3 devices) */
@keyframes float-up{
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: .4; }
  100% { transform: translateY(-120vh) translateX(var(--dx, 0px)) scale(.3); opacity: 0; }
}
.css-particle {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: var(--ac);
  animation: float-up var(--dur, 8s) linear var(--delay, 0s) infinite;
  pointer-events: none;
}
.css-particle.green { background: var(--bull); }
.css-particle.gold  { background: var(--gold); }

/* Three.js canvas wrapper */
.three-canvas-wrap {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.three-canvas-wrap canvas {
  display: block; width: 100% !important; height: 100% !important;
}

/* Globe section */
.globe-section {
  position: relative;
  background: var(--bg);
  padding: 120px 0;
  overflow: hidden;
  border-top: 1px solid var(--br);
}
.globe-canvas-container {
  position: relative;
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  aspect-ratio: 1 / 1;
}
.globe-canvas-container canvas {
  display: block;
  border-radius: 50%;
  box-shadow:
    0 0 0 1px rgba(59,130,246,.08),
    0 0 60px rgba(59,130,246,.06),
    0 0 120px rgba(59,130,246,.03);
}

/* SVG globe fallback */
.svg-globe-wrap {
  position: relative;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
}
@keyframes globe-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.globe-ring-anim { animation: globe-spin 24s linear infinite; transform-origin: center; }

/* Broker location dots */
@keyframes broker-pulse {
  0%,100% { r: 3; opacity: 1; }
  50%      { r: 6; opacity: .5; }
}
.broker-dot { animation: broker-pulse 2.4s ease-in-out infinite; }
.broker-dot:nth-child(2) { animation-delay: .4s; }
.broker-dot:nth-child(3) { animation-delay: .8s; }
.broker-dot:nth-child(4) { animation-delay: 1.2s; }
.broker-dot:nth-child(5) { animation-delay: 1.6s; }
.broker-dot:nth-child(6) { animation-delay: 2.0s; }

/* Arc lines on SVG globe */
@keyframes arc-draw {
  from { stroke-dashoffset: 300; opacity: 0; }
  10%  { opacity: .6; }
  80%  { opacity: .6; }
  to   { stroke-dashoffset: 0; opacity: 0; }
}
.globe-arc {
  stroke-dasharray: 300;
  stroke-dashoffset: 300;
  animation: arc-draw 3s ease-in-out infinite;
  fill: none;
}
.globe-arc:nth-child(1) { animation-delay: 0s; }
.globe-arc:nth-child(2) { animation-delay: 1s; }
.globe-arc:nth-child(3) { animation-delay: 2s; }

/* Order book 3D section */
.orderbook-section {
  position: relative;
  background: var(--bg1);
  border-top: 1px solid var(--br);
  border-bottom: 1px solid var(--br);
  padding: 100px 0;
  overflow: hidden;
}
.ob-canvas-wrap {
  position: relative;
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--br);
  background: var(--bg2);
}
.ob-canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

/* SVG order book fallback */
.ob-bar {
  transition: height .4s ease, y .4s ease, fill .3s ease;
}
@keyframes ob-pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: .7; }
}
.ob-bid { fill: var(--bull); }
.ob-ask { fill: var(--bear); }

/* Mouse glow (CSS-only, works on all tiers) */
#hero-mouse-glow {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(59,130,246,.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
  transform: translate(-50%, -50%);
  transition: left .12s ease, top .12s ease;
  will-change: left, top;
}

/* Tier badge (dev indicator, hidden in prod) */
#tier-badge{display:none}

/* ── EXISTING STYLES (carried over) ─────────────────────────── */

.live-dot{display:inline-block;width:6px;height:6px;background:var(--bull);border-radius:50%;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
.ticker-wrap{position:relative;overflow:hidden;height:40px;border-top:1px solid var(--br);border-bottom:1px solid var(--br);background:rgba(12,14,18,.82);backdrop-filter:blur(10px)}
.ticker-track{display:flex;align-items:center;white-space:nowrap;height:40px;animation:ticker-run 42s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{display:inline-flex;align-items:center;gap:8px;padding:0 22px;height:40px;border-right:1px solid var(--br);font-family:var(--fm);font-size:11.5px;letter-spacing:.02em}
.t-sym{color:var(--tx2)}.t-price{color:var(--tx);font-variant-numeric:tabular-nums;transition:color .3s}.t-ch.up{color:var(--bull)}.t-ch.dn{color:var(--bear)}
.fb-bull{animation:flash-bull 450ms ease-out}.fb-bear{animation:flash-bear 450ms ease-out}
.ticker-fade-l{position:absolute;left:0;top:0;bottom:0;width:70px;z-index:2;background:linear-gradient(to right,var(--bg),transparent);pointer-events:none}
.ticker-fade-r{position:absolute;right:0;top:0;bottom:0;width:70px;z-index:2;background:linear-gradient(to left,var(--bg),transparent);pointer-events:none}

nav.main-nav.scrolled{background:rgba(6,8,10,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br)}
.nav-link{position:relative;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--tx2);background:none;border:none;cursor:none;transition:color .15s ease;padding:2px 0}
.nav-link:hover{color:var(--tx)}
.nav-link::after{content:'';position:absolute;bottom:-3px;left:0;width:100%;height:2px;background:var(--ac);transform:scaleX(0);transform-origin:left;transition:transform .2s var(--ease)}
.nav-link:hover::after{transform:scaleX(1)}
.mob-menu{position:fixed;inset:0;background:var(--bg);z-index:490;transform:translateX(100%);transition:transform .4s var(--ease);overflow-y:auto;display:flex;flex-direction:column}

.ham{display:flex;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:6px}

.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 10px 32px rgba(59,130,246,.38)}
.btn-p .arr{transition:transform .15s}.btn-p:hover .arr{transform:translateX(4px)}

.btn-g:hover{border-color:var(--ac);background:rgba(59,130,246,.06);transform:translateY(-1px)}
.btn-gr{border-color:rgba(16,217,150,.4);color:var(--bull)}.btn-gr:hover{border-color:var(--bull);background:rgba(16,217,150,.06)}
.eyebrow-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:20px;padding:6px 16px;font-family:var(--fm);font-size:11px;letter-spacing:.08em;color:var(--tx2)}
.sec-eye{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:11px;letter-spacing:.12em;color:var(--ac);text-transform:uppercase;padding:5px 12px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.18);border-radius:4px}
.tag-g{color:var(--bull);background:rgba(16,217,150,.09);border:1px solid rgba(16,217,150,.22)}.tag-b{color:var(--ac);background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.22)}.tag-go{color:var(--gold);background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.22)}.tag-p{color:var(--purple);background:rgba(139,92,246,.09);border:1px solid rgba(139,92,246,.22)}
.hero-h1{font-family:var(--fd);font-weight:800;font-size:clamp(48px,7.5vw,96px);line-height:1.02;letter-spacing:-.03em;color:var(--tx)}
.tw-caret{display:inline-block;width:3px;height:.85em;background:var(--ac);margin-left:4px;vertical-align:text-bottom;animation:caret .82s step-end infinite}

.mt-hdr{background:var(--bg2);border-bottom:1px solid var(--br);padding:7px 12px;display:flex;align-items:center;gap:6px}
.ck-bull{fill:var(--bull)}.ck-bear{fill:var(--bear)}.wk-bull{stroke:var(--bull);stroke-width:1}.wk-bear{stroke:var(--bear);stroke-width:1}
.lat-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--ac);top:50%;transform:translateY(-50%);animation:lat-travel 2.2s ease-in-out infinite;box-shadow:0 0 8px var(--ac)}
.glow-blue{background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(59,130,246,.062) 0%,transparent 70%)}.glow-green{background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(16,217,150,.062) 0%,transparent 70%)}.glow-purple{background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(139,92,246,.062) 0%,transparent 70%)}

<body>
<div id="noise"></div>
<div id="obs-cursor"></div>
<div id="obs-dot"></div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══════════════════════════════════════════════════════════════
   DEVICE TIER DETECTION
   Runs once on load — determines which visual tier to render
   Tier 1 = High-end  (full Three.js, 2000 particles, globe + arcs)
   Tier 2 = Mid-range (Three.js lite, 400 particles, globe no arcs)
   Tier 3 = Low-end   (CSS only, SVG fallbacks, zero WebGL)
══════════════════════════════════════════════════════════════ */
const DeviceTier = (() => {
  let tier = null;
  const detect = () => {
    if (tier !== null) return tier;
    // Reduced motion → always CSS
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { tier = 3; return tier; }
    // Save data → always CSS
    if (navigator.connection?.saveData) { tier = 3; return tier; }
    // Check WebGL support
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) { tier = 3; return tier; }
    } catch(e) { tier = 3; return tier; }
    // Memory & CPU check
    const mem = navigator.deviceMemory || 4; // GB, defaults to 4 if unsupported
    const cpu = navigator.hardwareConcurrency || 4;
    const slow = navigator.connection?.effectiveType === '2g' || navigator.connection?.effectiveType === 'slow-2g';
    if (slow || mem < 2 || cpu < 2) { tier = 3; return tier; }
    if (mem >= 4 && cpu >= 4) { tier = 1; return tier; }
    tier = 2; return tier;
  };
  return { get: detect, isHigh: () => detect() === 1, isMid: () => detect() === 2, isLow: () => detect() === 3 };
})();

/* ══════════════════════════════════════════════════════════════
   THREE.JS LAZY LOADER
   Only loads the library when a 3D component actually needs it.
   Returns a promise that resolves to true when THREE is ready.
══════════════════════════════════════════════════════════════ */
let threePromise = null;
const loadThree = () => {
  if (DeviceTier.isLow()) return Promise.resolve(false);
  if (window.THREE) return Promise.resolve(true);
  if (threePromise) return threePromise;
  threePromise = new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    script.onload = () => resolve(true);
    script.onerror = () => resolve(false);
    document.head.appendChild(script);
  });
  return threePromise;
};

/* ══════════════════════════════════════════════════════════════
   UTILITY HOOKS
══════════════════════════════════════════════════════════════ */
function useReveal(delay=0,threshold=0.13){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting){setTimeout(()=>el.classList.add('on'),delay);obs.unobserve(el);}
    },{threshold,rootMargin:'0px 0px -50px 0px'});
    el.classList.add('rev');obs.observe(el);
    return()=>obs.disconnect();
  },[delay,threshold]);
  return ref;
}
function useVisibility(threshold=0.2){
  const ref=useRef(null);const[vis,setVis]=useState(false);
  useEffect(()=>{
    const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting){setVis(true);obs.disconnect();}},{threshold});
    if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();
  },[threshold]);
  return[ref,vis];
}

/* ══════════════════════════════════════════════════════════════
   COUNTER
══════════════════════════════════════════════════════════════ */
function easeOutExpo(t){return t>=1?1:1-Math.pow(2,-10*t);}
function Counter({val,pre='',suf='',dec=0,comma=false,dur=2200,sz='48px',cls=''}){
  const[disp,setDisp]=useState(pre+(comma?'0':dec>0?'0.00':'0')+suf);
  const ref=useRef(null);
  const fmt=n=>{let s=comma?Math.round(n).toLocaleString('en-US'):dec>0?n.toFixed(dec):String(Math.round(n));return pre+s+suf;};
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(entries=>{
      if(!entries[0].isIntersecting)return;obs.unobserve(el);
      const t0=performance.now();
      const tick=now=>{const p=Math.min((now-t0)/dur,1);setDisp(fmt(easeOutExpo(p)*val));if(p<1)requestAnimationFrame(tick);else setDisp(fmt(val));};
      requestAnimationFrame(tick);
    },{threshold:.3});
    obs.observe(el);return()=>obs.disconnect();
  },[val]);
  return<span ref={ref} className={`stat-num fm ${cls}`} style={{fontSize:sz,fontVariantNumeric:'tabular-nums'}} data-price>{disp}</span>;
}

/* ══════════════════════════════════════════════════════════════
   CURSOR CONTROLLER
══════════════════════════════════════════════════════════════ */
function CursorController(){
  useEffect(()=>{
    const cur=document.getElementById('obs-cursor');const dot=document.getElementById('obs-dot');
    if(!cur||!dot)return;
    if(!window.matchMedia('(hover:hover)').matches){cur.style.display='none';dot.style.display='none';return;}
    let tx=-100,ty=-100,cx=-100,cy=-100,raf=null;
    const onMove=e=>{tx=e.clientX;ty=e.clientY;dot.style.left=tx+'px';dot.style.top=ty+'px';};
    const loop=()=>{cx+=(tx-cx)*.12;cy+=(ty-cy)*.12;cur.style.left=cx+'px';cur.style.top=cy+'px';raf=requestAnimationFrame(loop);};
    document.addEventListener('mousemove',onMove);raf=requestAnimationFrame(loop);
    const ov=e=>{const t=e.target;if(t.closest('[data-price]')){cur.classList.add('cross');cur.classList.remove('xl');}else if(t.closest('a,button,input,select,[role=button]')){cur.classList.add('xl');cur.classList.remove('cross');}};
    const ou=()=>{cur.classList.remove('xl','cross');};
    document.addEventListener('mouseover',ov);document.addEventListener('mouseout',ou);
    return()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseover',ov);document.removeEventListener('mouseout',ou);cancelAnimationFrame(raf);};
  },[]);
  return null;
}

/* ══════════════════════════════════════════════════════════════
   PARTICLE FIELD — TIER-ADAPTIVE
   Tier 1/2: Three.js BufferGeometry Points (single draw call)
   Tier 3:   60 CSS animated divs
══════════════════════════════════════════════════════════════ */
function ParticleField({containerRef}){
  const canvasRef=useRef(null);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    const tier=DeviceTier.get();
    if(tier===3){setReady(true);return;} // CSS fallback handles it

    loadThree().then(ok=>{
      if(!ok){setReady(true);return;}
      const container=containerRef?.current;
      if(!container)return;
      const THREE=window.THREE;

      // Scene setup
      const scene=new THREE.Scene();
      const w=container.offsetWidth||window.innerWidth;
      const h=container.offsetHeight||window.innerHeight;
      const camera=new THREE.PerspectiveCamera(60,w/h,0.1,1000);
      camera.position.z=400;

      const renderer=new THREE.WebGLRenderer({canvas:canvasRef.current,alpha:true,antialias:false,powerPreference:'low-power'});
      renderer.setSize(w,h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,tier===1?2:1));
      renderer.setClearColor(0x000000,0);

      // Particle counts
      const count=tier===1?1800:420;
      const positions=new Float32Array(count*3);
      const colors=new Float32Array(count*3);
      const speeds=new Float32Array(count);
      const phases=new Float32Array(count);

      // Color palette: blue, green, gold — weighted toward blue
      const palette=[
        new THREE.Color('#3B82F6'),
        new THREE.Color('#3B82F6'),
        new THREE.Color('#3B82F6'),
        new THREE.Color('#10D996'),
        new THREE.Color('#F59E0B'),
      ];

      for(let i=0;i<count;i++){
        positions[i*3]=(Math.random()-0.5)*900;
        positions[i*3+1]=(Math.random()-0.5)*700;
        positions[i*3+2]=(Math.random()-0.5)*400;
        speeds[i]=0.08+Math.random()*0.12;
        phases[i]=Math.random()*Math.PI*2;
        const col=palette[Math.floor(Math.random()*palette.length)];
        colors[i*3]=col.r;colors[i*3+1]=col.g;colors[i*3+2]=col.b;
      }

      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
      geo.setAttribute('color',new THREE.BufferAttribute(colors,3));

      const mat=new THREE.PointsMaterial({size:tier===1?2.2:1.8,vertexColors:true,transparent:true,opacity:0.55,sizeAttenuation:true});
      const points=new THREE.Points(geo,mat);
      scene.add(points);

      // Mouse interaction (high tier only)
      let mouseX=0,mouseY=0;
      const onMouseMove=e=>{mouseX=(e.clientX/w-0.5)*0.3;mouseY=-(e.clientY/h-0.5)*0.3;};
      if(tier===1)window.addEventListener('mousemove',onMouseMove,{passive:true});

      let animId;let t=0;
      const animate=()=>{
        animId=requestAnimationFrame(animate);
        t+=0.006;
        const pos=geo.attributes.position.array;
        for(let i=0;i<count;i++){
          pos[i*3+1]+=speeds[i];
          // Wrap around top
          if(pos[i*3+1]>350)pos[i*3+1]=-350;
          // Gentle drift on X
          pos[i*3]+=Math.sin(t+phases[i])*0.08;
        }
        geo.attributes.position.needsUpdate=true;

        // Camera drift toward mouse
        if(tier===1){camera.position.x+=(mouseX*80-camera.position.x)*0.025;camera.position.y+=(mouseY*60-camera.position.y)*0.025;}
        camera.lookAt(scene.position);

        // Pulse opacity
        mat.opacity=0.42+Math.sin(t*0.7)*0.13;
        renderer.render(scene,camera);
      };
      animate();

      // Resize handler
      const onResize=()=>{
        const nw=container.offsetWidth||window.innerWidth;const nh=container.offsetHeight||window.innerHeight;
        camera.aspect=nw/nh;camera.updateProjectionMatrix();
        renderer.setSize(nw,nh);
      };
      window.addEventListener('resize',onResize,{passive:true});

      setReady(true);

      return()=>{
        cancelAnimationFrame(animId);
        window.removeEventListener('mousemove',onMouseMove);
        window.removeEventListener('resize',onResize);
        geo.dispose();mat.dispose();renderer.dispose();
      };
    });
  },[]);

  const tier=DeviceTier.get();

  if(tier===3){
    // CSS particle fallback — 60 divs, zero JS overhead
    const cssParticles=useMemo(()=>Array.from({length:60},(_,i)=>({
      id:i,
      left:Math.random()*100,
      bottom:Math.random()*20,
      dur:5+Math.random()*8,
      delay:Math.random()*8,
      dx:(Math.random()-0.5)*80,
      type:i%5===0?'green':i%7===0?'gold':'',
    })),[]);
    return(
      <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
        {cssParticles.map(p=>(
          <div key={p.id} className={`css-particle ${p.type}`} style={{left:`${p.left}%`,bottom:`${p.bottom}%`,'--dur':`${p.dur}s`,'--delay':`${p.delay}s`,'--dx':`${p.dx}px`}}/>
        ))}
      </div>
    );
  }

  return(
    <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:0,opacity:ready?1:0,transition:'opacity 1.2s ease'}}>
      <canvas ref={canvasRef} style={{display:'block',width:'100%',height:'100%'}}/>
    </div>
  );
}

// Convert lat/lon to 3D sphere point
function latLonToVec3(lat,lon,radius){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return{
    x:-(radius*Math.sin(phi)*Math.cos(theta)),
    y:radius*Math.cos(phi),
    z:radius*Math.sin(phi)*Math.sin(theta),
  };
}

      const dotMeshes=[];

      BROKER_CITIES.forEach(([lon,lat,name,count])=>{
        const{x,y,z}=latLonToVec3(lat,lon,radius+1);
        const mat=count>=2?largeDotMat:dotMat;
        const size=count>=2?2.8:2;
        const geo=new THREE.SphereGeometry(size,8,8);
        const mesh=new THREE.Mesh(geo,mat);
        mesh.position.set(x,y,z);
        scene.add(mesh);
        dotMeshes.push({mesh,x,y,z,phase:Math.random()*Math.PI*2});

        // Pulse ring
        const ringGeo=new THREE.RingGeometry(size+0.5,size+2,16);
        const ringMat=new THREE.MeshBasicMaterial({color:count>=2?0x3B82F6:0x10D996,transparent:true,opacity:.5,side:THREE.DoubleSide});
        const ring=new THREE.Mesh(ringGeo,ringMat);
        ring.position.set(x,y,z);
        ring.lookAt(new THREE.Vector3(0,0,0));
        scene.add(ring);
        dotMeshes.push({mesh:ring,isRing:true,phase:Math.random()*Math.PI*2});
      });

      // ── Arc lines between cities (Tier 1 only) ──
      const arcLines=[];
      if(tier===1){
        const arcPairs=[[0,1],[1,2],[0,3],[3,4],[1,4],[2,0]];
        arcPairs.forEach(([a,b])=>{
          const cityA=BROKER_CITIES[a],cityB=BROKER_CITIES[b];
          if(!cityA||!cityB)return;
          const pA=latLonToVec3(cityA[1],cityA[0],radius+2);
          const pB=latLonToVec3(cityB[1],cityB[0],radius+2);
          const vA=new THREE.Vector3(pA.x,pA.y,pA.z);
          const vB=new THREE.Vector3(pB.x,pB.y,pB.z);

          // Create arc via midpoint elevation
          const mid=vA.clone().add(vB).multiplyScalar(0.5);
          const dist=vA.distanceTo(vB);
          mid.normalize().multiplyScalar(radius+dist*0.22);

          const curve=new THREE.QuadraticBezierCurve3(vA,mid,vB);
          const pts=curve.getPoints(48);
          const arcGeo=new THREE.BufferGeometry().setFromPoints(pts);
          const arcMat=new THREE.LineBasicMaterial({color:0x3B82F6,transparent:true,opacity:0,linewidth:1});
          const line=new THREE.Line(arcGeo,arcMat);
          scene.add(line);
          arcLines.push({line,mat:arcMat,phase:Math.random()*Math.PI*2,speed:0.5+Math.random()*0.5});
        });
      }

      // ── Ambient stars ──
      const starGeo=new THREE.BufferGeometry();
      const starCount=600;
      const starPos=new Float32Array(starCount*3);
      for(let i=0;i<starCount;i++){
        starPos[i*3]=(Math.random()-0.5)*800;
        starPos[i*3+1]=(Math.random()-0.5)*800;
        starPos[i*3+2]=(Math.random()-0.5)*800;
      }
      starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
      const starMat=new THREE.PointsMaterial({size:0.8,color:0x8B95A3,transparent:true,opacity:.4});
      scene.add(new THREE.Points(starGeo,starMat));

      // ── Interaction ──
      let isDragging=false,prevX=0,rotY=0,targetRotY=0;
      let autoSpin=true;
      const onDown=e=>{isDragging=true;prevX=e.clientX||e.touches?.[0]?.clientX;autoSpin=false;};
      const onMove=e=>{if(!isDragging)return;const cx=e.clientX||e.touches?.[0]?.clientX;targetRotY+=(cx-prevX)*0.005;prevX=cx;};
      const onUp=()=>{isDragging=false;};
      canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
      canvas.addEventListener('touchstart',onDown,{passive:true});canvas.addEventListener('touchmove',onMove,{passive:true});canvas.addEventListener('touchend',onUp);
      canvas.style.cursor='grab';

      let animId,t=0;
      const animate=()=>{
        animId=requestAnimationFrame(animate);
        t+=0.008;
        if(autoSpin)targetRotY+=0.003;
        rotY+=(targetRotY-rotY)*0.05;
        globe.rotation.y=rotY;

        // Sync inner sphere & dots with globe
        scene.children.forEach(child=>{
          if(child instanceof THREE.Mesh&&child!==globe){
            // Keep stars static, rotate dots with globe
          }
        });
        globe.rotation.y=rotY;

        // Pulse dots
        dotMeshes.forEach(({mesh,phase,isRing})=>{
          if(isRing){mesh.material.opacity=.3+Math.sin(t*2+phase)*.2;}
          else{const s=1+Math.sin(t*1.5+phase)*.12;mesh.scale.setScalar(s);}
        });

        // Animate arc opacity (Tier 1)
        arcLines.forEach(({mat,phase,speed})=>{
          mat.opacity=Math.max(0,Math.sin(t*speed+phase))*.7;
        });

        renderer.render(scene,camera);
      };
      animate();

      const onResize=()=>{
        const nw=canvas.parentElement?.offsetWidth||500;
        renderer.setSize(nw,nw);
      };
      window.addEventListener('resize',onResize,{passive:true});

      return()=>{
        cancelAnimationFrame(animId);
        canvas.removeEventListener('mousedown',onDown);canvas.removeEventListener('mousemove',onMove);canvas.removeEventListener('mouseup',onUp);
        window.removeEventListener('resize',onResize);
        renderer.dispose();
      };
    });
  },[]);
  return null;
}

/* ══════════════════════════════════════════════════════════════
   ORDER BOOK 3D VISUALIZATION — TIER-ADAPTIVE
   Tier 1: Three.js InstancedMesh bars, animated per-tick
   Tier 2: Three.js static bars
   Tier 3: SVG animated bar chart
══════════════════════════════════════════════════════════════ */

// Generate bid/ask ladder data
function generateOrderBook(){
  const midPrice=1.08452;
  const bids=Array.from({length:12},(_,i)=>({price:+(midPrice-(i+1)*0.0001).toFixed(5),vol:Math.random()*8+1}));
  const asks=Array.from({length:12},(_,i)=>({price:+(midPrice+(i+1)*0.0001).toFixed(5),vol:Math.random()*8+1}));
  return{bids,asks,mid:midPrice};
}

function OrderBookThreeJS({canvasRef,bookData}){
  const sceneRef=useRef(null);
  const instancesRef=useRef(null);

  useEffect(()=>{
    const tier=DeviceTier.get();
    loadThree().then(ok=>{
      if(!ok||!canvasRef.current)return;
      const THREE=window.THREE;
      const canvas=canvasRef.current;
      const w=canvas.parentElement?.offsetWidth||640;
      const h=w*(9/16);

      const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:tier===1,powerPreference:'low-power'});
      renderer.setSize(w,h);renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
      renderer.setClearColor(0x000000,0);
      renderer.shadowMap.enabled=false;

      const scene=new THREE.Scene();
      const camera=new THREE.PerspectiveCamera(45,w/h,0.1,1000);
      camera.position.set(0,18,38);camera.lookAt(0,0,0);
      sceneRef.current=scene;

      // Floor grid
      const gridHelper=new THREE.GridHelper(48,24,0x1C2028,0x1C2028);
      gridHelper.material.opacity=.5;gridHelper.material.transparent=true;
      scene.add(gridHelper);

      const barCount=12;
      const barW=1.4;const barGap=0.5;const totalW=(barW+barGap)*barCount;

      // ── Bid bars (green) ──
      const bidGeo=new THREE.BoxGeometry(barW,1,barW*0.7);
      const bidMat=new THREE.MeshBasicMaterial({color:0x10D996,transparent:true,opacity:.85});
      const bidMesh=new THREE.InstancedMesh(bidGeo,bidMat,barCount);
      scene.add(bidMesh);

      // ── Ask bars (red) ──
      const askGeo=new THREE.BoxGeometry(barW,1,barW*0.7);
      const askMat=new THREE.MeshBasicMaterial({color:0xFF3B5C,transparent:true,opacity:.85});
      const askMesh=new THREE.InstancedMesh(askGeo,askMat,barCount);
      scene.add(askMesh);

      instancesRef.current={bidMesh,askMesh};

      // ── Glow planes under bars ──
      const bidGlowGeo=new THREE.PlaneGeometry(totalW/2,barW*0.8);
      const bidGlowMat=new THREE.MeshBasicMaterial({color:0x10D996,transparent:true,opacity:.08,side:THREE.DoubleSide});
      const bidGlow=new THREE.Mesh(bidGlowGeo,bidGlowMat);
      bidGlow.rotation.x=-Math.PI/2;bidGlow.position.set(-totalW/4,0.01,0);
      scene.add(bidGlow);

      const askGlowGeo=new THREE.PlaneGeometry(totalW/2,barW*0.8);
      const askGlowMat=new THREE.MeshBasicMaterial({color:0xFF3B5C,transparent:true,opacity:.08,side:THREE.DoubleSide});
      const askGlow=new THREE.Mesh(askGlowGeo,askGlowMat);
      askGlow.rotation.x=-Math.PI/2;askGlow.position.set(totalW/4,0.01,0);
      scene.add(askGlow);

      // Mid price line
      const midGeo=new THREE.PlaneGeometry(0.08,12);
      const midMat=new THREE.MeshBasicMaterial({color:0xF59E0B,transparent:true,opacity:.7,side:THREE.DoubleSide});
      const midLine=new THREE.Mesh(midGeo,midMat);
      midLine.rotation.x=-Math.PI/2;midLine.position.set(0,0.02,0);
      scene.add(midLine);

      // Helper to update bar heights
      const dummy=new THREE.Object3D();
      const updateBars=(bids,asks)=>{
        const maxVol=Math.max(...bids.map(b=>b.vol),...asks.map(a=>a.vol));
        bids.forEach((bid,i)=>{
          const h=Math.max(.2,(bid.vol/maxVol)*14);
          const x=-(i+.5)*(barW+barGap);
          dummy.position.set(x,h/2,0);dummy.scale.set(1,h,1);dummy.updateMatrix();
          bidMesh.setMatrixAt(i,dummy.matrix);
        });
        asks.forEach((ask,i)=>{
          const h=Math.max(.2,(ask.vol/maxVol)*14);
          const x=(i+.5)*(barW+barGap);
          dummy.position.set(x,h/2,0);dummy.scale.set(1,h,1);dummy.updateMatrix();
          askMesh.setMatrixAt(i,dummy.matrix);
        });
        bidMesh.instanceMatrix.needsUpdate=true;
        askMesh.instanceMatrix.needsUpdate=true;
      };

      updateBars(bookData.bids,bookData.asks);

      // Camera orbit
      let camAngle=0;
      let animId;let t=0;
      const animate=()=>{
        animId=requestAnimationFrame(animate);
        t+=0.005;

        // Gentle camera orbit
        camAngle+=0.003;
        camera.position.x=Math.sin(camAngle)*12;
        camera.position.z=Math.cos(camAngle)*38+8;
        camera.lookAt(0,5,0);

        // Pulse glows
        bidGlowMat.opacity=.05+Math.sin(t*1.2)*.04;
        askGlowMat.opacity=.05+Math.sin(t*1.2+1)*.04;

        renderer.render(scene,camera);
      };
      animate();

      // Update bars when bookData changes
      if(tier===1){
        // Store updateBars for external calls
        canvas._updateBars=updateBars;
      }

      const onResize=()=>{
        const nw=canvas.parentElement?.offsetWidth||640;const nh=nw*(9/16);
        camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);
      };
      window.addEventListener('resize',onResize,{passive:true});

      return()=>{cancelAnimationFrame(animId);window.removeEventListener('resize',onResize);renderer.dispose();};
    });
  },[]);

  return null;
}

// SVG order book fallback
function OrderBookSVG({bookData}){
  const[book,setBook]=useState(bookData);
  useEffect(()=>{
    const iv=setInterval(()=>{
      setBook(prev=>({
        bids:prev.bids.map(b=>({...b,vol:Math.max(.5,b.vol+(Math.random()-.5)*1.5)})),
        asks:prev.asks.map(a=>({...a,vol:Math.max(.5,a.vol+(Math.random()-.5)*1.5)})),
        mid:prev.mid,
      }));
    },1200);
    return()=>clearInterval(iv);
  },[]);

  const maxVol=Math.max(...book.bids.map(b=>b.vol),...book.asks.map(a=>a.vol));
  const W=640,H=260,barW=22,gap=3,barCount=12;

  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
      {/* Subtle grid */}
      {[0,65,130,195,260].map(y=><line key={y} x1="0" y1={y} x2={W} y2={y} stroke="#1C2028" strokeWidth=".5"/>)}
      {/* Center line */}
      <line x1={W/2} y1="0" x2={W/2} y2={H} stroke="#F59E0B" strokeWidth="1" strokeOpacity=".6"/>
      <text x={W/2} y="14" textAnchor="middle" fill="#F59E0B" fontSize="10" fontFamily="var(--fm)">{book.mid.toFixed(5)} MID</text>

      {/* Bid bars (left of center, growing left) */}
      {book.bids.slice(0,barCount).map((bid,i)=>{
        const barH=Math.max(4,(bid.vol/maxVol)*(H-40));
        const x=W/2-(i+1)*(barW+gap);
        return(
          <g key={i}>
            <rect x={x} y={H-barH-20} width={barW} height={barH} className="ob-bar ob-bid" rx="2" style={{filter:'drop-shadow(0 0 4px var(--bull))',transition:'height .4s ease,y .4s ease'}}/>
            {i<3&&<text x={x+barW/2} y={H-12} textAnchor="middle" fill="var(--tx3)" fontSize="8" fontFamily="var(--fm)">{bid.price.toFixed(4).slice(-3)}</text>}
          </g>
        );
      })}

      {/* Ask bars (right of center, growing right) */}
      {book.asks.slice(0,barCount).map((ask,i)=>{
        const barH=Math.max(4,(ask.vol/maxVol)*(H-40));
        const x=W/2+(i*(barW+gap))+gap;
        return(
          <g key={i}>
            <rect x={x} y={H-barH-20} width={barW} height={barH} className="ob-bar ob-ask" rx="2" style={{filter:'drop-shadow(0 0 4px var(--bear))',transition:'height .4s ease,y .4s ease'}}/>
            {i<3&&<text x={x+barW/2} y={H-12} textAnchor="middle" fill="var(--tx3)" fontSize="8" fontFamily="var(--fm)">{ask.price.toFixed(4).slice(-3)}</text>}
          </g>
        );
      })}

      {/* Legend */}
      <circle cx="40" cy="20" r="4" fill="var(--bull)"/><text x="50" y="24" fill="var(--tx2)" fontSize="10" fontFamily="var(--fb)">BID depth</text>
      <circle cx="140" cy="20" r="4" fill="var(--bear)"/><text x="150" y="24" fill="var(--tx2)" fontSize="10" fontFamily="var(--fb)">ASK depth</text>
    </svg>
  );
}

function ScrollStories(){
  const[si,setSi]=useState(0);const[fi,setFi]=useState(0);const ref=useRef(null);
  useEffect(()=>{const onS=()=>{if(!ref.current)return;const rel=window.scrollY-ref.current.offsetTop;const fh=window.innerHeight*.88;const total=STORIES.reduce((a,s)=>a+s.frames.length,0);const f=Math.max(0,Math.min(Math.floor(rel/fh),total-1));let cum=0;for(let s=0;s<STORIES.length;s++){if(f<cum+STORIES[s].frames.length){setSi(s);setFi(f-cum);break;}cum+=STORIES[s].frames.length;}};window.addEventListener('scroll',onS,{passive:true});return()=>window.removeEventListener('scroll',onS);},[]);
