# ============================================================
# Obsidian Platform — Nginx Reverse Proxy
# Path-based routing:
#   /           → Web Trader Terminal (Next.js)
#   /admin/*    → Broker Admin (Next.js static export)
#   /api/*      → Backend API (NestJS)
#   /graphql    → Backend GraphQL
#   /ws/prana   → PranaStream WebSocket
# ============================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Basic settings ───────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

    # ── Upstreams ────────────────────────────────────────────
    upstream backend_upstream {
        server backend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream broker_admin_upstream {
        server broker-admin:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Server: HTTP (redirect to HTTPS) ─────────────────────
    server {
        listen 80;
        server_name _;

        # ACME / Let's Encrypt challenge endpoint
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/letsencrypt;
        }

        # Health check (used by docker healthcheck + load balancers)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Server: HTTPS ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — certs mounted at /etc/nginx/ssl/
        # Generate with: mkdir -p ssl && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout ssl/key.pem -out ssl/cert.pem
        # For Let's Encrypt, use certbot instead.
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling off;

        # ── Web Trader Terminal (default) ─────────────────────
        location / {
            limit_req zone=web burst=50 nodelay;

            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Client body / headers
            client_max_body_size 10M;
            client_body_timeout 30s;
            client_header_timeout 10s;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ── Broker Admin (sub-path) ──────────────────────────
        location ^~ /admin/ {
            limit_req zone=admin burst=20 nodelay;

            proxy_pass http://broker_admin_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            client_max_body_size 10M;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Backend API ───────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # WebSocket upgrade (for PranaStream)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            client_max_body_size 50M;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── GraphQL ───────────────────────────────────────────
        location /graphql {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            client_max_body_size 10M;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── WebSocket (PranaStream) ───────────────────────────
        location /ws/ {
            # No rate limiting on WS — keepalive handles concurrency

            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeouts for persistent WS connections
            proxy_send_timeout    86400s;
            proxy_read_timeout    86400s;

            proxy_buffering off;
        }

        # ── Static assets (cache aggressively) ────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            access_log off;
        }

        # ── Deny access to hidden files ───────────────────────
        location ~ /\. {
            deny all;
            log_not_found off;
        }
    }
}