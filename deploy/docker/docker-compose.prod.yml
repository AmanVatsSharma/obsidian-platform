# Obsidian Platform - Production Docker Compose for Coolify
# Usage: docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ===================
  # Database
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-postgres
    environment:
      POSTGRES_DB: obsidian
      POSTGRES_USER: obsidian
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsidian"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===================
  # Redis
  # ===================
  redis:
    image: redis:7-alpine
    container_name: obsidian-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===================
  # Backend API
  # ===================
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: obsidian-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://obsidian:${DB_PASSWORD:-changeme}@postgres:5432/obsidian
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ===================
  # Web Frontend
  # ===================
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    container_name: obsidian-web
    environment:
      NODE_ENV: production
      # In Docker, use service name 'backend' for internal communication
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
      NEXT_PUBLIC_PRANA_WS_URL: ${NEXT_PUBLIC_PRANA_WS_URL:-ws://backend:3000/ws/prana}
    ports:
      - "4200:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ===================
  # Migrations (run once)
  # ===================
  migrations:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.migrations
    container_name: obsidian-migrations
    environment:
      DATABASE_URL: postgres://obsidian:${DB_PASSWORD:-changeme}@postgres:5432/obsidian
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

# ===================
# Volumes
# ===================
volumes:
  postgres_data:
  redis_data:
