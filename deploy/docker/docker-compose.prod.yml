# ============================================================
# Obsidian Platform — Production Docker Compose
# Enterprise-grade: security, resilience, observability
# ============================================================
#
# Usage:
#   cp deploy/docker/.env.example .env
#   # Fill in secrets in .env
#   docker compose -f deploy/docker/docker-compose.prod.yml up -d
#
# Migrations (first deploy or schema changes):
#   docker compose -f deploy/docker/docker-compose.prod.yml run --rm migrations
#
# Logs:
#   docker compose -f deploy/docker/docker-compose.prod.yml logs -f
#
# Stop:
#   docker compose -f deploy/docker/docker-compose.prod.yml down
# ============================================================

version: "3.9"

# ============================================================
# ENV FILE
# ============================================================
# All secrets and configuration live in .env (NOT committed).
# Copy .env.example and fill in real values before deploy.

# ============================================================
# NETWORKS — isolated per-tier
# ============================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false  # allow outbound (Redis, external APIs)

# ============================================================
# VOLUMES — named, driver-local
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # PostgreSQL 16 — Primary datastore
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: obsidian-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-obsidian}
      POSTGRES_USER: ${POSTGRES_USER:-obsidian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obsidian}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ----------------------------------------------------------
  # Redis 7 — Cache + WS scale adapter
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: obsidian-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ----------------------------------------------------------
  # Backend API — NestJS
  # ----------------------------------------------------------
  backend:
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: obsidian-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-obsidian}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-obsidian}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      OTP_DEV_MODE: ${OTP_DEV_MODE:-false}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-kite}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY required}
    expose:
      - "3000"
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Web Frontend — Trader Terminal (Next.js Standalone)
  # ----------------------------------------------------------
  web:
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.web
    container_name: obsidian-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
      NEXT_PUBLIC_PRANA_WS_URL: ${NEXT_PUBLIC_PRANA_WS_URL:-ws://backend:3000/ws/prana}
    expose:
      - "3000"
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Broker Admin — Back-office UI (Static Export)
  # ----------------------------------------------------------
  broker-admin:
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.broker-admin
    container_name: obsidian-broker-admin
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
    expose:
      - "3000"
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------
  # Nginx — Reverse Proxy + TLS Termination
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: obsidian-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certs here
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy
      broker-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ----------------------------------------------------------
  # Migrations — One-shot TypeORM migration runner
  # ----------------------------------------------------------
  # Run manually: docker compose -f deploy/docker/docker-compose.prod.yml run --rm migrations
  # Do NOT enable restart — it's a one-shot task.
  migrations:
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile.migrations
    container_name: obsidian-migrations
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-obsidian}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-obsidian}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
