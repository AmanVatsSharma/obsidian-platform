name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify dependency cycles
        run: npm run check:cycles

      - name: Verify duplicate files
        run: npm run check:duplicates

      - name: Lint affected
        run: npm run affected:lint -- --base=origin/main --head=HEAD

      - name: Test affected
        run: npm run affected:test -- --base=origin/main --head=HEAD

      - name: Connector contract tests
        run: npm run test:contracts

      - name: Build affected
        run: npm run affected:build -- --base=origin/main --head=HEAD
